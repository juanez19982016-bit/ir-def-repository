name: "🔬 QA: Test Synthetic NAM Quality"

on:
  workflow_dispatch:

jobs:
  qa-synthetic-nam:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy scipy matplotlib tqdm
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: "🔬 Run Quality Assurance Tests"
        env:
          RCLONE_REMOTE: gdrive2:IR_DEF_REPOSITORY
          OUTPUT_DIR: /tmp/nam_qa
          PYTHONIOENCODING: utf-8
        run: python scripts/qa_synthetic_nam.py

      - name: "📊 Show QA Report"
        if: always()
        run: cat /tmp/nam_qa/reports/QA_REPORT.txt 2>/dev/null || echo "Report not generated"

      - name: "📎 Upload QA artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nam-qa-reports
          path: /tmp/nam_qa/reports/
          retention-days: 30
