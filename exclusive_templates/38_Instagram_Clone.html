<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaView — Photo Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #000;
            --card: #000;
            --border: #262626;
            --text: #fafafa;
            --muted: #8e8e8e;
            --accent: #0095f6;
            --like: #ed4956;
            --gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text)
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            z-index: 10;
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px
        }

        .nav-inner {
            max-width: 935px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .n-logo {
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            font-style: italic
        }

        .n-icons {
            display: flex;
            gap: 16px;
            font-size: 1.2rem;
            align-items: center
        }

        .n-icons span {
            cursor: pointer;
            padding: 4px;
            transition: opacity .1s
        }

        .n-icons span:hover {
            opacity: .7
        }

        .n-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer
        }

        .n-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .container {
            max-width: 630px;
            margin: 76px auto 0;
            padding: 0 16px
        }

        .stories {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px
        }

        .stories::-webkit-scrollbar {
            display: none
        }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex-shrink: 0
        }

        .story-ring {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            padding: 3px;
            background: var(--gradient)
        }

        .story-ring.seen {
            background: #333
        }

        .story-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--bg)
        }

        .story-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .story-name {
            font-size: .68rem;
            max-width: 66px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center
        }

        .post {
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 12px
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0
        }

        .post-av {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0
        }

        .post-av.has-story {
            padding: 2px;
            border: none;
            background: var(--gradient);
            border-radius: 50%
        }

        .post-av.has-story .inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--bg)
        }

        .post-av img,
        .post-av .inner img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .post-user {
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer
        }

        .post-user:hover {
            opacity: .7
        }

        .post-location {
            font-size: .72rem;
            color: var(--muted)
        }

        .post-menu {
            margin-left: auto;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px
        }

        .post-img {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #111
        }

        .post-img img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .post-img-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0;
            pointer-events: none;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, .5));
            z-index: 2
        }

        .post-img-heart.show {
            animation: heartPop .8s ease forwards
        }

        @keyframes heartPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.3)
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2)
            }

            45% {
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-20px)
            }
        }

        .post-actions {
            display: flex;
            align-items: center;
            padding: 8px 0;
            gap: 12px
        }

        .pa-icon {
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform .15s;
            user-select: none
        }

        .pa-icon:hover {
            opacity: .7
        }

        .pa-icon:active {
            transform: scale(1.2)
        }

        .pa-icon.liked {
            color: var(--like);
            animation: likeAnim .3s ease
        }

        @keyframes likeAnim {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        .pa-right {
            margin-left: auto
        }

        .pa-icon.saved {
            color: var(--text)
        }

        .post-likes {
            font-weight: 600;
            font-size: .85rem;
            padding: 2px 0;
            cursor: pointer
        }

        .post-caption {
            font-size: .85rem;
            line-height: 1.4;
            padding: 2px 0
        }

        .post-caption strong {
            font-weight: 600;
            cursor: pointer
        }

        .post-comments-link {
            font-size: .85rem;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 0
        }

        .post-time {
            font-size: .68rem;
            color: var(--muted);
            padding: 4px 0;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .post-add-comment {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0
        }

        .post-add-comment input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: .85rem;
            outline: none;
            font-family: 'Inter'
        }

        .post-add-comment button {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            opacity: .5;
            font-family: 'Inter';
            transition: opacity .1s
        }

        .post-add-comment button.active {
            opacity: 1
        }

        .suggestions {
            position: fixed;
            right: calc((100% - 935px)/2);
            top: 76px;
            width: 290px
        }

        .sg-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px
        }

        .sg-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer
        }

        .sg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .sg-name {
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer
        }

        .sg-name:hover {
            opacity: .7
        }

        .sg-fullname {
            font-size: .82rem;
            color: var(--muted)
        }

        .sg-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px
        }

        .sg-title span:first-child {
            font-weight: 600;
            font-size: .82rem;
            color: var(--muted)
        }

        .sg-title span:last-child {
            font-size: .78rem;
            cursor: pointer;
            font-weight: 600
        }

        .sg-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0
        }

        .sg-user-av {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0
        }

        .sg-user-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .sg-user-info {
            flex: 1;
            min-width: 0
        }

        .sg-user-name {
            font-weight: 600;
            font-size: .82rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .sg-user-reason {
            font-size: .72rem;
            color: var(--muted)
        }

        .sg-follow {
            font-size: .78rem;
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter'
        }

        .sg-follow.following {
            color: var(--text)
        }

        @media(max-width:1024px) {
            .suggestions {
                display: none
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-inner"><span class="n-logo">InstaView</span>
            <div class="n-icons">
                <span>🏠</span><span>🔍</span><span>🧭</span><span>💬</span><span>❤️</span><span>➕</span>
                <div class="n-avatar"><img src="https://i.pravatar.cc/56?img=11"></div>
            </div>
        </div>
    </nav>

    <div class="container" id="container"></div>
    <div class="suggestions">
        <div class="sg-header">
            <div class="sg-avatar"><img src="https://i.pravatar.cc/112?img=11"></div>
            <div>
                <div class="sg-name">john_dev</div>
                <div class="sg-fullname">John Developer</div>
            </div>
        </div>
        <div class="sg-title"><span>Suggested for you</span><span>See All</span></div>
        <div id="suggestions"></div>
    </div>

    <script>
        const storyUsers = [
            { name: 'sarah_ui', img: 'https://i.pravatar.cc/132?img=1', seen: false },
            { name: 'mike_code', img: 'https://i.pravatar.cc/132?img=3', seen: false },
            { name: 'alex_dev', img: 'https://i.pravatar.cc/132?img=5', seen: true },
            { name: 'tom_react', img: 'https://i.pravatar.cc/132?img=8', seen: false },
            { name: 'lisa_css', img: 'https://i.pravatar.cc/132?img=9', seen: true },
            { name: 'emma_ux', img: 'https://i.pravatar.cc/132?img=16', seen: false },
            { name: 'david_ts', img: 'https://i.pravatar.cc/132?img=12', seen: true },
        ];

        const posts = [
            { user: 'sarah_ui', avatar: 'https://i.pravatar.cc/64?img=1', location: 'San Francisco, CA', img: 'https://picsum.photos/seed/ig1/640/640', likes: 2847, caption: 'Just shipped a new design system 🎨✨ 200+ components, dark mode, and accessibility built-in. Link in bio!', tags: '#uidesign #designsystem #react', comments: 142, time: '3 HOURS AGO', hasStory: true },
            { user: 'mike_code', avatar: 'https://i.pravatar.cc/64?img=3', location: 'New York, NY', img: 'https://picsum.photos/seed/ig2/640/640', likes: 1203, caption: 'POV: Your deployment passed all tests on the first try 🤯', tags: '#developer #coding #devhumor', comments: 67, time: '5 HOURS AGO', hasStory: true },
            { user: 'alex_dev', avatar: 'https://i.pravatar.cc/64?img=5', img: 'https://picsum.photos/seed/ig3/640/640', likes: 4521, caption: 'My workspace setup for 2026 🖥️ — ultrawide monitor, ergo keyboard, and a plant named "Sudo" 🌱', tags: '#workspace #developer #setup', comments: 234, time: '8 HOURS AGO' },
            { user: 'tom_react', avatar: 'https://i.pravatar.cc/64?img=8', location: 'Austin, TX', img: 'https://picsum.photos/seed/ig4/640/640', likes: 892, caption: 'Built this dashboard from scratch in 3 hours using DevVault Pro templates. Best investment I made this year 💰', tags: '#react #dashboard #webdev', comments: 45, time: '12 HOURS AGO', hasStory: true },
        ];

        const suggestedUsers = [
            { name: 'next_guru', fullname: 'Anna Next.js', img: 'https://i.pravatar.cc/64?img=14', reason: 'Followed by sarah_ui' },
            { name: 'rust_dev', fullname: 'Max Rustman', img: 'https://i.pravatar.cc/64?img=15', reason: 'Suggested for you' },
            { name: 'css_queen', fullname: 'Maya Styles', img: 'https://i.pravatar.cc/64?img=16', reason: 'Followed by mike_code' },
            { name: 'go_master', fullname: 'Leo Golang', img: 'https://i.pravatar.cc/64?img=17', reason: 'Popular in your area' },
        ];

        function render() {
            const c = document.getElementById('container');
            // Stories
            let html = '<div class="stories">';
            html += storyUsers.map(s => `<div class="story" onclick="viewStory('${s.name}')"><div class="story-ring${s.seen ? ' seen' : ''}"><div class="story-inner"><img src="${s.img}" alt="${s.name}"></div></div><div class="story-name">${s.name}</div></div>`).join('');
            html += '</div>';

            // Posts
            posts.forEach((p, i) => {
                html += `<div class="post">
      <div class="post-header">
        <div class="post-av${p.hasStory ? ' has-story' : ''}">${p.hasStory ? `<div class="inner"><img src="${p.avatar}"></div>` : `<img src="${p.avatar}">`}</div>
        <div><div class="post-user">${p.user}</div>${p.location ? `<div class="post-location">${p.location}</div>` : ''}</div>
        <span class="post-menu">⋯</span>
      </div>
      <div class="post-img" ondblclick="doubleTapLike(${i})"><img src="${p.img}" alt="Post" loading="lazy"><div class="post-img-heart" id="heart${i}">❤️</div></div>
      <div class="post-actions">
        <span class="pa-icon" id="like${i}" onclick="toggleLike(${i})">🤍</span>
        <span class="pa-icon">💬</span>
        <span class="pa-icon">↗️</span>
        <span class="pa-right"><span class="pa-icon" id="save${i}" onclick="toggleSave(${i})">🔖</span></span>
      </div>
      <div class="post-likes" id="likeCount${i}">${p.likes.toLocaleString()} likes</div>
      <div class="post-caption"><strong>${p.user}</strong> ${p.caption} <span style="color:var(--accent)">${p.tags}</span></div>
      <div class="post-comments-link">View all ${p.comments} comments</div>
      <div class="post-time">${p.time}</div>
      <div class="post-add-comment"><span style="font-size:1.1rem;cursor:pointer">😊</span><input placeholder="Add a comment..." oninput="this.nextElementSibling.classList.toggle('active',this.value.length>0)"><button>Post</button></div>
    </div>`;
            });
            c.innerHTML = html;

            // Suggestions
            document.getElementById('suggestions').innerHTML = suggestedUsers.map((s, i) => `<div class="sg-user"><div class="sg-user-av"><img src="${s.img}"></div><div class="sg-user-info"><div class="sg-user-name">${s.name}</div><div class="sg-user-reason">${s.reason}</div></div><button class="sg-follow" id="sgFollow${i}" onclick="toggleSugFollow(${i})">${'Follow'}</button></div>`).join('');
        }

        const likeState = {};
        function toggleLike(i) {
            likeState[i] = !likeState[i];
            const icon = document.getElementById('like' + i);
            const count = document.getElementById('likeCount' + i);
            icon.textContent = likeState[i] ? '❤️' : '🤍';
            icon.classList.toggle('liked', likeState[i]);
            const p = posts[i];
            count.textContent = (likeState[i] ? p.likes + 1 : p.likes).toLocaleString() + ' likes';
        }

        function doubleTapLike(i) {
            if (!likeState[i]) toggleLike(i);
            const heart = document.getElementById('heart' + i);
            heart.classList.remove('show'); void heart.offsetWidth; heart.classList.add('show');
        }

        function toggleSave(i) {
            const s = document.getElementById('save' + i);
            const saved = s.textContent === '💛';
            s.textContent = saved ? '🔖' : '💛';
        }

        function toggleSugFollow(i) {
            const btn = document.getElementById('sgFollow' + i);
            const following = btn.classList.toggle('following');
            btn.textContent = following ? 'Following' : 'Follow';
        }

        function viewStory(name) { alert(`Viewing ${name}'s story`) }

        render();
    </script>
</body>

</html>
