name: Ultimate Serverless CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: "20.x"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    # Spin up an ephemeral Postgres for test hooks
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saastest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Typecheck
      run: npm run typecheck
      
    - name: ESLint
      run: npm run lint
      
    - name: Database Push (Test DB)
      run: npx prisma db push
      env:
        DATABASE_URL: postgresql://test:password@localhost:5432/saastest
        
    - name: Run Jest Unit Tests
      run: npm run test
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E Tests
      run: npm run e2e
      
  deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-saas-repo
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
    - name: Force new deployment in ECS
      run: |
        aws ecs update-service --cluster prod-cluster --service saas-service --force-new-deployment
