<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinBoard — Visual Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #fff;
            --card: #fff;
            --border: #ddd;
            --accent: #e60023;
            --text: #111;
            --muted: #767676
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text)
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fff;
            z-index: 10;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 56px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .08)
        }

        .n-logo {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--accent);
            margin-right: 4px
        }

        .n-link {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .12s
        }

        .n-link.active {
            background: #111;
            color: #fff
        }

        .n-link:not(.active):hover {
            background: #f1f1f1
        }

        .n-search {
            flex: 1;
            margin: 0 8px;
            position: relative
        }

        .n-search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 100px;
            background: #eee;
            border: none;
            font-size: .88rem;
            outline: none;
            font-family: 'Inter';
            transition: background .12s
        }

        .n-search input:focus {
            background: #e2e2e2
        }

        .n-search::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: .85rem
        }

        .n-right {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 1.1rem;
            color: var(--muted)
        }

        .n-right span {
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: background .12s
        }

        .n-right span:hover {
            background: #f1f1f1
        }

        .n-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer
        }

        .n-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .masonry {
            column-count: 5;
            column-gap: 14px;
            padding: 72px 16px 24px;
            max-width: 1400px;
            margin: 0 auto
        }

        @media(max-width:1200px) {
            .masonry {
                column-count: 4
            }
        }

        @media(max-width:900px) {
            .masonry {
                column-count: 3
            }
        }

        @media(max-width:600px) {
            .masonry {
                column-count: 2
            }
        }

        .pin {
            break-inside: avoid;
            margin-bottom: 14px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform .15s
        }

        .pin:hover {
            transform: translateY(-2px)
        }

        .pin:hover .pin-overlay {
            opacity: 1
        }

        .pin-img {
            width: 100%;
            display: block;
            border-radius: 16px
        }

        .pin-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            opacity: 0;
            transition: opacity .2s;
            display: flex;
            flex-direction: column;
            padding: 12px;
            border-radius: 16px
        }

        .pin-top {
            display: flex;
            justify-content: flex-end;
            gap: 6px
        }

        .pin-btn {
            padding: 8px 14px;
            border-radius: 100px;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: 'Inter';
            transition: all .12s
        }

        .save-btn {
            background: var(--accent);
            color: #fff
        }

        .save-btn:hover {
            background: #c9001f
        }

        .save-btn.saved {
            background: #000;
            color: #fff
        }

        .more-btn {
            background: rgba(255, 255, 255, .9);
            color: #111
        }

        .more-btn:hover {
            background: #fff
        }

        .pin-bottom {
            margin-top: auto;
            display: flex;
            gap: 6px
        }

        .pin-link {
            padding: 6px 12px;
            border-radius: 100px;
            background: rgba(255, 255, 255, .9);
            font-size: .72rem;
            font-weight: 500;
            color: #111;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-decoration: none;
            transition: background .12s
        }

        .pin-link:hover {
            background: #fff
        }

        .pin-info {
            padding: 8px 4px
        }

        .pin-title {
            font-size: .82rem;
            font-weight: 500;
            line-height: 1.3
        }

        .pin-author {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: .75rem;
            color: var(--muted)
        }

        .pin-author-av {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            overflow: hidden
        }

        .pin-author-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: .85rem;
            font-weight: 600;
            transition: transform .3s ease;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .3)
        }

        .toast.show {
            transform: translateX(-50%) translateY(0)
        }
    </style>
</head>

<body>
    <nav>
        <span class="n-logo">📌</span>
        <span class="n-link active" onclick="setNav(this)">Home</span>
        <span class="n-link" onclick="setNav(this)">Explore</span>
        <span class="n-link" onclick="setNav(this)">Create</span>
        <div class="n-search"><input placeholder="Search for ideas" id="searchInput"></div>
        <div class="n-right"><span>🔔</span><span>💬</span>
            <div class="n-avatar"><img src="https://i.pravatar.cc/64?img=11" alt="User"></div><span>▾</span>
        </div>
    </nav>
    <div class="masonry" id="masonry"></div>
    <div class="toast" id="toast"></div>

    <script>
        const pins = [
            { img: 'https://picsum.photos/seed/pin1/400/560', title: 'Modern Dashboard UI Design — Dark Mode with Gradients', author: 'sarah_designs', avatar: 'https://i.pravatar.cc/48?img=1', link: 'dribbble.com' },
            { img: 'https://picsum.photos/seed/pin2/400/320', title: 'Minimal Website Inspiration — Clean & Modern', author: 'nature_photos', avatar: 'https://i.pravatar.cc/48?img=2' },
            { img: 'https://picsum.photos/seed/pin3/400/500', title: 'Glassmorphism UI Kit — Components for Web Apps', author: 'alex_ui', avatar: 'https://i.pravatar.cc/48?img=3', link: 'behance.net' },
            { img: 'https://picsum.photos/seed/pin4/400/380', title: 'SaaS Landing Page — Hero Section Concepts', author: 'design_hub', avatar: 'https://i.pravatar.cc/48?img=4' },
            { img: 'https://picsum.photos/seed/pin5/400/280', title: 'Typography Pairing Guide 2026', author: 'font_lover', avatar: 'https://i.pravatar.cc/48?img=5' },
            { img: 'https://picsum.photos/seed/pin6/400/450', title: 'Mobile App Design System — Complete UI Kit', author: 'mike_design', avatar: 'https://i.pravatar.cc/48?img=6', link: 'figma.com' },
            { img: 'https://picsum.photos/seed/pin7/400/520', title: 'Dark Mode Design Patterns — Best Practices', author: 'tom_ux', avatar: 'https://i.pravatar.cc/48?img=7' },
            { img: 'https://picsum.photos/seed/pin8/400/340', title: 'Data Visualization — Chart Design Inspiration', author: 'data_viz', avatar: 'https://i.pravatar.cc/48?img=8' },
            { img: 'https://picsum.photos/seed/pin9/400/440', title: 'E-Commerce Product Cards — Premium Designs', author: 'lisa_dev', avatar: 'https://i.pravatar.cc/48?img=9', link: 'dribbble.com' },
            { img: 'https://picsum.photos/seed/pin10/400/300', title: 'Startup Landing Pages — Conversion Optimized', author: 'growth_ui', avatar: 'https://i.pravatar.cc/48?img=10' },
            { img: 'https://picsum.photos/seed/pin11/400/480', title: '3D Illustrations for Web — Isometric Pack', author: 'art_3d', avatar: 'https://i.pravatar.cc/48?img=11', link: 'figma.com' },
            { img: 'https://picsum.photos/seed/pin12/400/360', title: 'Color Palette Generator — Modern Harmonies', author: 'color_pro', avatar: 'https://i.pravatar.cc/48?img=12' },
            { img: 'https://picsum.photos/seed/pin13/400/500', title: 'Portfolio Templates — Developer Showcase', author: 'portfolios', avatar: 'https://i.pravatar.cc/48?img=14' },
            { img: 'https://picsum.photos/seed/pin14/400/420', title: 'AI Interface Design — Chatbot UX Patterns', author: 'ai_ux', avatar: 'https://i.pravatar.cc/48?img=15', link: 'behance.net' },
            { img: 'https://picsum.photos/seed/pin15/400/300', title: 'Icon Design System — 500+ Consistent Icons', author: 'icon_pack', avatar: 'https://i.pravatar.cc/48?img=16' },
        ];

        function renderPins() {
            const grid = document.getElementById('masonry');
            grid.innerHTML = pins.map((p, i) => `
    <div class="pin">
      <img class="pin-img" src="${p.img}" alt="${p.title}" loading="lazy">
      <div class="pin-overlay">
        <div class="pin-top">
          <button class="pin-btn save-btn" onclick="event.stopPropagation();savePin(this,${i})">Save</button>
        </div>
        <div class="pin-bottom">
          ${p.link ? `<a class="pin-link" href="#" onclick="event.stopPropagation()">🔗 ${p.link}</a>` : ''}
          <button class="pin-btn more-btn" onclick="event.stopPropagation()" style="margin-left:auto">⋯</button>
        </div>
      </div>
      <div class="pin-info">
        <div class="pin-title">${p.title}</div>
        <div class="pin-author"><div class="pin-author-av"><img src="${p.avatar}" alt="${p.author}"></div>${p.author}</div>
      </div>
    </div>
  `).join('');
        }

        function savePin(btn, i) {
            const saved = btn.classList.toggle('saved');
            btn.textContent = saved ? 'Saved' : 'Save';
            showToast(saved ? `Saved "${pins[i].title.substring(0, 30)}..."` : 'Pin removed from saved');
        }

        function setNav(el) {
            document.querySelectorAll('.n-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        renderPins();
    </script>
</body>

</html>
