name: "Crear ZIPs Consolidados"

on:
  workflow_dispatch:

jobs:
  zip-drive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      
      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          
      - name: "📦 Crear Carpeta Destino"
        run: |
          rclone mkdir gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI
          
      - name: "📦 Zip: 02_AMPLIFICADORES_NAM"
        run: |
          echo "Descargando..."
          rclone copy gdrive2:IR_DEF_REPOSITORY/02_AMPLIFICADORES_NAM /tmp/02_AMPLIFICADORES_NAM --transfers 16 --drive-chunk-size 64M -v
          echo "Comprimiendo..."
          cd /tmp && zip -r 02_AMPLIFICADORES_NAM.zip 02_AMPLIFICADORES_NAM
          echo "Subiendo..."
          rclone copyto /tmp/02_AMPLIFICADORES_NAM.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/02_AMPLIFICADORES_NAM.zip -v
          rm -rf /tmp/02_AMPLIFICADORES_NAM /tmp/02_AMPLIFICADORES_NAM.zip

      - name: "📦 Zip: 03_PEDALES_BOUTIQUE_NAM"
        run: |
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PEDALES_BOUTIQUE_NAM /tmp/03_PEDALES_BOUTIQUE_NAM --transfers 16 -v
          cd /tmp && zip -r 03_PEDALES_BOUTIQUE_NAM.zip 03_PEDALES_BOUTIQUE_NAM
          rclone copyto /tmp/03_PEDALES_BOUTIQUE_NAM.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/03_PEDALES_BOUTIQUE_NAM.zip -v
          rm -rf /tmp/03_PEDALES_BOUTIQUE_NAM /tmp/03_PEDALES_BOUTIQUE_NAM.zip

      - name: "📦 Zip: 04_PRESETS_MULTI_EFECTOS"
        run: |
          rclone copy gdrive2:IR_DEF_REPOSITORY/04_PRESETS_MULTI_EFECTOS /tmp/04_PRESETS_MULTI_EFECTOS --transfers 16 -v
          cd /tmp && zip -r 04_PRESETS_MULTI_EFECTOS.zip 04_PRESETS_MULTI_EFECTOS
          rclone copyto /tmp/04_PRESETS_MULTI_EFECTOS.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/04_PRESETS_MULTI_EFECTOS.zip -v
          rm -rf /tmp/04_PRESETS_MULTI_EFECTOS /tmp/04_PRESETS_MULTI_EFECTOS.zip

      - name: "📦 Zip: 05_BAJO_Y_ACUSTICA"
        run: |
          rclone copy gdrive2:IR_DEF_REPOSITORY/05_BAJO_Y_ACUSTICA /tmp/05_BAJO_Y_ACUSTICA --transfers 16 -v
          cd /tmp && zip -r 05_BAJO_Y_ACUSTICA.zip 05_BAJO_Y_ACUSTICA
          rclone copyto /tmp/05_BAJO_Y_ACUSTICA.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/05_BAJO_Y_ACUSTICA.zip -v
          rm -rf /tmp/05_BAJO_Y_ACUSTICA /tmp/05_BAJO_Y_ACUSTICA.zip

      - name: "📦 Zip: 06_REVERBS_DE_ESTUDIO"
        run: |
          rclone copy gdrive2:IR_DEF_REPOSITORY/06_REVERBS_DE_ESTUDIO /tmp/06_REVERBS_DE_ESTUDIO --transfers 16 -v
          cd /tmp && zip -r 06_REVERBS_DE_ESTUDIO.zip 06_REVERBS_DE_ESTUDIO
          rclone copyto /tmp/06_REVERBS_DE_ESTUDIO.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/06_REVERBS_DE_ESTUDIO.zip -v
          rm -rf /tmp/06_REVERBS_DE_ESTUDIO /tmp/06_REVERBS_DE_ESTUDIO.zip
          
      - name: "📦 Zip: 01_GABINETES_IRs_GUITARRA (MUY PESADO)"
        run: |
          echo "Descargando la carpeta más grande..."
          rclone copy gdrive2:IR_DEF_REPOSITORY/01_GABINETES_IRs_GUITARRA /tmp/01_GABINETES_IRs_GUITARRA --transfers 32 --drive-chunk-size 128M -v
          echo "Comprimiendo ~1.6 GB de IRs..."
          cd /tmp && zip -r 01_GABINETES_IRs_GUITARRA.zip 01_GABINETES_IRs_GUITARRA
          echo "Subiendo..."
          rclone copyto /tmp/01_GABINETES_IRs_GUITARRA.zip gdrive2:IR_DEF_REPOSITORY/07_DESCARGA_FACIL_AQUI/01_GABINETES_IRs_GUITARRA.zip -v
          rm -rf /tmp/01_GABINETES_IRs_GUITARRA /tmp/01_GABINETES_IRs_GUITARRA.zip
