name: Build God-Tier Developer Vault 2026

on:
  workflow_dispatch:

jobs:
  build_vault:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Search and Scrape Elite Repos
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Running V3 Ultra-Premium Scraper..."
        python scripts/github_code_scraper.py

    - name: Download & Extract Boilerplates
      run: |
        echo "Downloading all repos..."
        python scripts/mega_processor_dev.py \
          --json github_dev_assets.json \
          --output God_Tier_Dev_Vault

    - name: Generate Category Indices & Master Catalog
      run: |
        echo "Generating INDICE.md per category and CATALOG.md..."
        python scripts/generate_vault_catalog.py God_Tier_Dev_Vault name_mapping.json

    - name: Generate Bonus Cheat Sheets
      run: |
        echo "Creating premium cheat sheets..."
        python scripts/generate_cheat_sheets.py God_Tier_Dev_Vault

    - name: Generate Welcome README
      run: |
        cat > God_Tier_Dev_Vault/README.md << 'DEVEOF'
        # 🏆 DevVault Pro 2026 — V2.0

        **La librería privada más completa para desarrolladores web.**
        **150+ proyectos profesionales · 16 categorías · 20 guías de referencia**

        ## 📖 Cómo Usar Este Vault

        1. Abre `CATALOG.md` para ver el catálogo completo con todos los proyectos y su stack tecnológico.
        2. Cada carpeta de categoría tiene un `INDICE.md` con el listado detallado.
        3. Cada proyecto tiene un `PROJECT_INFO.md` con instrucciones de uso.
        4. Copia la carpeta del proyecto que necesites y ejecuta `npm install && npm run dev`.
        5. Revisa `[BONUS] Cheat_Sheets_2026/` para 20 guías de referencia rápida.

        ## 📂 Categorías (16)

        ### Frameworks & SaaS
        - **Premium SaaS Boilerplates** → Next.js 15 + Stripe + Auth + Supabase
        - **Fullstack Production Apps** → Apps completas listas para deploy
        - **Ecommerce Starter Kits** → Tiendas online con carrito y pagos

        ### UI & Design
        - **Shadcn UI Blocks & Kits** → 80K+ estrellas, componentes premium
        - **Tailwind Component Libraries** → DaisyUI, Flowbite, NextUI, HeadlessUI
        - **Framer Motion UI Kits** → Animaciones y micro-interacciones
        - **Landing Pages High Conversion** → Páginas de venta optimizadas

        ### AI & Chatbots
        - **AI SaaS & Chatbots** → OpenAI, LangChain, LobeChat, Flowise

        ### Business
        - **React Admin Dashboards** → Paneles con gráficos y tablas
        - **CRM & Business Tools** → Twenty CRM, Trigger.dev, OpenStatus
        - **Auth & Payment Modules** → NextAuth, Lucia, Clerk, Stripe

        ### Portfolio & Content
        - **Portfolio & Blog Templates** → Sitios personales + blogs MDX

        ### Mobile & Tools
        - **React Native Mobile Starters** → Expo, NativeWind, Tamagui
        - **Email Templates & Systems** → React Email + Resend
        - **Developer Tools & Utilities** → Zustand, Zod, React Query, dnd-kit
        - **Chrome Extensions & Browser** → Extensiones listas para publicar

        ### 🎁 BONUS
        - **20 Cheat Sheets** → Next.js, React, TypeScript, Tailwind, Shadcn, Stripe, Supabase, Prisma, OpenAI, Docker, Git, y más

        ## ⚖️ Licencia
        Todos los proyectos incluidos son **open-source con licencias permisivas** (MIT/ISC/Apache): uso comercial libre.

        ---
        *DevVault Pro 2026 V2.0 — Ahorra meses de trabajo. Entrega proyectos en días.*
        DEVEOF

    - name: Report Vault Size
      run: |
        echo "=== VAULT SIZE REPORT ==="
        du -sh God_Tier_Dev_Vault/ || true
        echo "=== BY CATEGORY ==="
        du -sh God_Tier_Dev_Vault/*/ || true
        echo "=== TOTAL FILES ==="
        find God_Tier_Dev_Vault/ -type f | wc -l || true
        echo "=== DOCUMENTATION FILES ==="
        find God_Tier_Dev_Vault/ -name "INDICE.md" -o -name "CATALOG.md" -o -name "README.md" | head -20

    - name: Compress Vault into Archives
      run: |
        echo "Creating .zip (Windows-friendly)..."
        apt-get -qq install -y zip > /dev/null 2>&1 || true
        cd God_Tier_Dev_Vault && zip -r -q ../DevVault_Pro_2026.zip . && cd ..
        ls -lh DevVault_Pro_2026.zip
        echo "Creating .tar.gz (Mac/Linux)..."
        tar -czf DevVault_Pro_2026.tar.gz God_Tier_Dev_Vault/
        ls -lh DevVault_Pro_2026.tar.gz
        echo "Both archives ready!"

    - name: Install rclone
      run: curl -fsSL https://rclone.org/install.sh | sudo bash

    - name: Configure rclone
      env:
        RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
      run: |
        mkdir -p ~/.config/rclone
        echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
        rclone listremotes

    - name: Upload Archives to Google Drive (FAST)
      run: |
        echo "Uploading both archives..."
        rclone copy DevVault_Pro_2026.zip gdrive2:DevVault_Pro/ -v --stats 10s
        rclone copy DevVault_Pro_2026.tar.gz gdrive2:DevVault_Pro/ -v --stats 10s
        echo "Upload complete!"
        rclone size gdrive2:DevVault_Pro/ || true
