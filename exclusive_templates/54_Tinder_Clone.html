<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchSpark — Dating App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #111;
            --card: #1a1a1a;
            --border: rgba(255, 255, 255, .08);
            --accent: #ff6b6b;
            --gold: linear-gradient(135deg, #f59e0b, #d97706);
            --text: #fff;
            --muted: rgba(255, 255, 255, .5)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .app {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            flex-shrink: 0
        }

        .logo {
            font-weight: 900;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .h-icons {
            display: flex;
            gap: 12px;
            color: var(--muted);
            font-size: 1.1rem
        }

        .h-icon {
            cursor: pointer;
            transition: color .12s;
            position: relative
        }

        .h-icon:hover {
            color: var(--text)
        }

        .h-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent)
        }

        .card-stack {
            flex: 1;
            position: relative;
            overflow: hidden;
            margin: 0 16px
        }

        .profile-card {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end
        }

        .pc-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem
        }

        .pc-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 40%, rgba(0, 0, 0, .8) 100%)
        }

        .pc-info {
            position: relative;
            z-index: 2;
            padding: 16px
        }

        .pc-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px
        }

        .pc-name {
            font-size: 1.5rem;
            font-weight: 800
        }

        .pc-age {
            font-size: 1.3rem;
            font-weight: 400
        }

        .pc-verified {
            font-size: .65rem;
            padding: 2px 8px;
            border-radius: 100px;
            background: rgba(59, 130, 246, .2);
            color: #60a5fa
        }

        .pc-distance {
            font-size: .82rem;
            color: var(--muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .pc-bio {
            font-size: .88rem;
            line-height: 1.4;
            margin-bottom: 8px
        }

        .pc-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px
        }

        .pc-tag {
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(255, 255, 255, .1);
            font-size: .72rem;
            backdrop-filter: blur(10px)
        }

        .pc-interests {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .pc-interest {
            padding: 4px 10px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, .15);
            font-size: .72rem
        }

        .pc-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0
        }

        .pc-dot {
            flex: 1;
            height: 3px;
            border-radius: 100px;
            background: rgba(255, 255, 255, .2)
        }

        .pc-dot.active {
            background: #fff
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            flex-shrink: 0
        }

        .action-btn {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid;
            transition: all .15s
        }

        .action-btn:hover {
            transform: scale(1.1)
        }

        .btn-sm {
            width: 44px;
            height: 44px;
            font-size: 1rem
        }

        .btn-lg {
            width: 56px;
            height: 56px;
            font-size: 1.3rem
        }

        .btn-nope {
            border-color: rgba(239, 68, 68, .3);
            color: #ef4444
        }

        .btn-nope:hover {
            background: rgba(239, 68, 68, .1);
            box-shadow: 0 0 20px rgba(239, 68, 68, .2)
        }

        .btn-super {
            border-color: rgba(59, 130, 246, .3);
            color: #3b82f6
        }

        .btn-super:hover {
            background: rgba(59, 130, 246, .1)
        }

        .btn-like {
            border-color: rgba(34, 197, 94, .3);
            color: #22c55e
        }

        .btn-like:hover {
            background: rgba(34, 197, 94, .1);
            box-shadow: 0 0 20px rgba(34, 197, 94, .2)
        }

        .btn-boost {
            border-color: rgba(139, 92, 246, .3);
            color: #8b5cf6
        }

        .btn-boost:hover {
            background: rgba(139, 92, 246, .1)
        }

        .btn-rewind {
            border-color: rgba(245, 158, 11, .3);
            color: #f59e0b
        }

        .btn-rewind:hover {
            background: rgba(245, 158, 11, .1)
        }

        .match-popup {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            backdrop-filter: blur(20px)
        }

        .mp-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .mp-avatars {
            display: flex;
            gap: -12px;
            justify-content: center
        }

        .mp-av {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem
        }

        .mp-btn {
            padding: 12px 48px;
            border-radius: 100px;
            background: linear-gradient(135deg, #ec4899, #f59e0b);
            color: #fff;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Inter';
            font-size: 1rem
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            flex-shrink: 0
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 1rem;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 16px
        }

        .nav-item.active {
            color: var(--accent)
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="app-header"><span class="logo">🔥 MatchSpark</span>
            <div class="h-icons"><span class="h-icon">🛡️</span><span class="h-icon">🔔<div class="h-badge"></div>
                    </span></div>
        </div>
        <div class="card-stack">
            <div class="profile-card" style="transform:rotate(2deg);opacity:.4;z-index:0">
                <div class="pc-bg" style="background:linear-gradient(135deg,#22c55e,#16a34a)">🌿</div>
                <div class="pc-gradient"></div>
            </div>
            <div class="profile-card" style="z-index:1">
                <div class="pc-bg" style="background:linear-gradient(135deg,#7c3aed,#ec4899)">👩‍💻</div>
                <div class="pc-gradient"></div>
                <div class="pc-info">
                    <div class="pc-dots">
                        <div class="pc-dot active"></div>
                        <div class="pc-dot"></div>
                        <div class="pc-dot"></div>
                        <div class="pc-dot"></div>
                    </div>
                    <div class="pc-top"><span class="pc-name">Sarah</span><span class="pc-age">28</span><span
                            class="pc-verified">✓ Verified</span></div>
                    <div class="pc-distance">📍 3 miles away</div>
                    <div class="pc-bio">Full-stack dev who speaks fluent TypeScript. Looking for someone who can explain
                        the event loop without Googling it 😄</div>
                    <div class="pc-tags"><span class="pc-tag">👩‍💻 Software Engineer</span><span class="pc-tag">🎓
                            Stanford CS</span></div>
                    <div class="pc-interests"><span class="pc-interest">🧗 Rock Climbing</span><span
                            class="pc-interest">☕ Coffee</span><span class="pc-interest">🎮 Gaming</span><span
                            class="pc-interest">📚 Books</span></div>
                </div>
            </div>
        </div>
        <div class="actions">
            <button class="action-btn btn-sm btn-rewind">↩️</button>
            <button class="action-btn btn-lg btn-nope">✕</button>
            <button class="action-btn btn-sm btn-super">⭐</button>
            <button class="action-btn btn-lg btn-like">♥</button>
            <button class="action-btn btn-sm btn-boost">⚡</button>
        </div>
        <div class="nav-bar">
            <div class="nav-item active">🔥</div>
            <div class="nav-item">🔍</div>
            <div class="nav-item">💎</div>
            <div class="nav-item">💬</div>
            <div class="nav-item">👤</div>
        </div>
    </div>
</body>

</html>
