<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamUI — Streaming Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #141414;
            --text: #fff;
            --muted: #808080;
            --accent: #e50914;
            --card: #181818
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 48px;
            display: flex;
            align-items: center;
            gap: 32px;
            transition: background .3s;
            background: linear-gradient(rgba(0, 0, 0, .9), transparent)
        }

        nav.scrolled {
            background: var(--bg)
        }

        .n-logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--accent);
            cursor: pointer;
            letter-spacing: -1px
        }

        .n-links {
            display: flex;
            gap: 20px;
            font-size: .85rem;
            color: var(--muted)
        }

        .n-links a {
            cursor: pointer;
            transition: color .15s;
            text-decoration: none;
            color: inherit
        }

        .n-links a:hover,
        .n-links a.active {
            color: var(--text)
        }

        .n-right {
            margin-left: auto;
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 1rem;
            color: var(--muted)
        }

        .n-right span {
            cursor: pointer;
            padding: 4px;
            transition: color .15s
        }

        .n-right span:hover {
            color: var(--text)
        }

        .n-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer
        }

        .n-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .hero {
            height: 85vh;
            position: relative;
            overflow: hidden;
            margin-bottom: -100px
        }

        .hero-bg {
            position: absolute;
            inset: 0
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, .9) 0%, rgba(0, 0, 0, .4) 50%, transparent 100%), linear-gradient(to top, var(--bg) 0%, transparent 40%)
        }

        .hero-info {
            position: absolute;
            bottom: 200px;
            left: 48px;
            max-width: 500px;
            z-index: 2
        }

        .hero-badge {
            background: var(--accent);
            padding: 4px 8px;
            border-radius: 2px;
            font-size: .68rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, .5)
        }

        .hero-meta {
            font-size: .82rem;
            color: var(--muted);
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .hero-match {
            color: #46d369;
            font-weight: 700
        }

        .hero-desc {
            font-size: .92rem;
            line-height: 1.5;
            color: #ddd;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .hero-btns {
            display: flex;
            gap: 8px
        }

        .h-btn {
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Inter';
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .15s
        }

        .h-btn-play {
            background: #fff;
            color: #000
        }

        .h-btn-play:hover {
            background: #ddd
        }

        .h-btn-info {
            background: rgba(109, 109, 110, .7);
            color: #fff
        }

        .h-btn-info:hover {
            background: rgba(109, 109, 110, .5)
        }

        .row {
            padding: 0 48px;
            margin-bottom: 40px;
            position: relative
        }

        .row-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px
        }

        .row-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 4px 0
        }

        .row-scroll::-webkit-scrollbar {
            display: none
        }

        .card {
            flex-shrink: 0;
            width: 240px;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform .3s, z-index .1s
        }

        .card:hover {
            transform: scale(1.3);
            z-index: 5
        }

        .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 60%, rgba(0, 0, 0, .9));
            opacity: 0;
            transition: opacity .3s;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 8px
        }

        .card:hover .card-overlay {
            opacity: 1
        }

        .card-actions {
            display: flex;
            gap: 4px
        }

        .card-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .5);
            background: rgba(20, 20, 20, .7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            cursor: pointer;
            transition: all .15s
        }

        .card-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, .2)
        }

        .card-btn.play-btn {
            background: #fff;
            color: #000;
            border-color: #fff
        }

        .card-info-mini {
            margin-top: 4px
        }

        .card-match {
            font-size: .65rem;
            color: #46d369;
            font-weight: 700
        }

        .card-tags {
            font-size: .6rem;
            color: var(--muted)
        }

        .top10 {
            display: flex;
            gap: 48px;
            padding: 4px 0
        }

        .top10-card {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform .2s;
            position: relative
        }

        .top10-card:hover {
            transform: scale(1.05)
        }

        .top10-num {
            font-size: 8rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 3px #808080;
            line-height: .8;
            margin-right: -20px;
            z-index: 0;
            min-width: 80px;
            text-align: center
        }

        .top10-img {
            width: 120px;
            height: 170px;
            border-radius: 4px;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .5)
        }

        .top10-img img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .row-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 80px;
            background: rgba(0, 0, 0, .6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            font-size: 1.2rem;
            color: #fff;
            opacity: 0;
            transition: opacity .2s;
            border: none
        }

        .row:hover .row-arrow {
            opacity: 1
        }

        .row-arrow:hover {
            background: rgba(0, 0, 0, .8)
        }

        .row-arrow.left {
            left: 48px;
            border-radius: 0 4px 4px 0
        }

        .row-arrow.right {
            right: 48px;
            border-radius: 4px 0 0 4px
        }
    </style>
</head>

<body>
    <nav id="nav">
        <span class="n-logo">STREAMUI</span>
        <div class="n-links"><a class="active">Home</a><a>TV Shows</a><a>Movies</a><a>New & Popular</a><a>My List</a>
        </div>
        <div class="n-right"><span>🔍</span><span>🔔</span>
            <div class="n-avatar"><img src="https://i.pravatar.cc/64?img=11"></div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-bg"><img src="https://picsum.photos/seed/netflix-hero/1920/1080" alt="Hero"></div>
        <div class="hero-gradient"></div>
        <div class="hero-info">
            <span class="hero-badge">🏆 #1 in TV Today</span>
            <div class="hero-title">The Code Breakers</div>
            <div class="hero-meta"><span class="hero-match">97% Match</span><span>2026</span><span>🔞
                    TV-MA</span><span>3 Seasons</span><span>🔊 5.1</span></div>
            <div class="hero-desc">A team of elite developers races against time to stop a rogue AI from taking over the
                world's infrastructure. Part thriller, part love letter to open source.</div>
            <div class="hero-btns"><button class="h-btn h-btn-play" onclick="play()">▶ Play</button><button
                    class="h-btn h-btn-info">ℹ️ More Info</button></div>
        </div>
    </div>

    <div id="rows"></div>

    <script>
        const rows = [
            {
                title: 'Trending Now', items: [
                    { title: 'The Algorithm', img: 'https://picsum.photos/seed/nf1/480/270', match: 96 },
                    { title: 'Silicon Valley: Rebooted', img: 'https://picsum.photos/seed/nf2/480/270', match: 93 },
                    { title: 'Hack the Planet', img: 'https://picsum.photos/seed/nf3/480/270', match: 88 },
                    { title: 'Merge Conflicts', img: 'https://picsum.photos/seed/nf4/480/270', match: 91 },
                    { title: 'Runtime Error', img: 'https://picsum.photos/seed/nf5/480/270', match: 85 },
                    { title: 'Open Source', img: 'https://picsum.photos/seed/nf6/480/270', match: 94 },
                    { title: 'Deploy Friday', img: 'https://picsum.photos/seed/nf7/480/270', match: 82 },
                ]
            },
            {
                title: 'Popular on StreamUI', items: [
                    { title: 'The Git Rebase', img: 'https://picsum.photos/seed/nf8/480/270', match: 92 },
                    { title: 'Container Wars', img: 'https://picsum.photos/seed/nf9/480/270', match: 87 },
                    { title: 'Serverless', img: 'https://picsum.photos/seed/nf10/480/270', match: 90 },
                    { title: 'The Cloud', img: 'https://picsum.photos/seed/nf11/480/270', match: 95 },
                    { title: 'Zero Day', img: 'https://picsum.photos/seed/nf12/480/270', match: 89 },
                    { title: 'API Gateway', img: 'https://picsum.photos/seed/nf13/480/270', match: 84 },
                ]
            },
            {
                title: 'Top 10 in Your Country', top10: true, items: [
                    { title: 'The Algorithm', img: 'https://picsum.photos/seed/t1/240/340' },
                    { title: 'Silicon Valley', img: 'https://picsum.photos/seed/t2/240/340' },
                    { title: 'Hack the Planet', img: 'https://picsum.photos/seed/t3/240/340' },
                    { title: 'Merge Conflicts', img: 'https://picsum.photos/seed/t4/240/340' },
                    { title: 'Runtime Error', img: 'https://picsum.photos/seed/t5/240/340' },
                ]
            },
            {
                title: 'Continue Watching', items: [
                    { title: 'The Code Breakers S2', img: 'https://picsum.photos/seed/nf14/480/270', match: 97, progress: 65 },
                    { title: 'DevOps Diary', img: 'https://picsum.photos/seed/nf15/480/270', match: 86, progress: 30 },
                    { title: 'Frontend Wars', img: 'https://picsum.photos/seed/nf16/480/270', match: 91, progress: 80 },
                ]
            },
        ];

        function renderRows() {
            document.getElementById('rows').innerHTML = rows.map((r, ri) => {
                if (r.top10) {
                    return `<div class="row"><div class="row-title">${r.title}</div><div class="row-scroll top10">${r.items.map((item, i) => `<div class="top10-card"><span class="top10-num">${i + 1}</span><div class="top10-img"><img src="${item.img}" alt="${item.title}" loading="lazy"></div></div>`).join('')}</div></div>`;
                }
                return `<div class="row"><div class="row-title">${r.title}</div><button class="row-arrow left" onclick="scrollRow(${ri},-1)">‹</button><div class="row-scroll" id="row${ri}">${r.items.map(item => `<div class="card"><div class="card-img"><img src="${item.img}" alt="${item.title}" loading="lazy">${item.progress ? `<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:#333"><div style="height:100%;width:${item.progress}%;background:var(--accent)"></div></div>` : ''}</div><div class="card-overlay"><div class="card-actions"><span class="card-btn play-btn">▶</span><span class="card-btn" onclick="event.stopPropagation();toggleMyList(this)">+</span><span class="card-btn">👍</span><span class="card-btn" style="margin-left:auto">▼</span></div><div class="card-info-mini"><div class="card-match">${item.match}% Match</div><div class="card-tags">${item.title}</div></div></div></div>`).join('')}</div><button class="row-arrow right" onclick="scrollRow(${ri},1)">›</button></div>`;
            }).join('');
        }

        function scrollRow(i, dir) {
            const row = document.getElementById('row' + i);
            if (row) row.scrollBy({ left: dir * 600, behavior: 'smooth' });
        }

        function toggleMyList(btn) { btn.textContent = btn.textContent === '+' ? '✓' : '+' }
        function play() { alert('▶ Now playing: The Code Breakers') }

        // Nav background on scroll
        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 100);
        });

        renderRows();
    </script>
</body>

</html>
