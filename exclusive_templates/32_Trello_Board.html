<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Project Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #1d2125;
            --card: #22272b;
            --text: #b6c2cf;
            --heading: #c7d1db;
            --muted: #768390;
            --border: #333c43;
            --accent: #579dff;
            --green: #4bce97;
            --yellow: #f5cd47;
            --red: #f87168;
            --purple: #9f8fef
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        nav {
            background: #1d2125;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        .n-logo {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--heading);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer
        }

        .n-links {
            display: flex;
            gap: 4px
        }

        .n-link {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: .82rem;
            cursor: pointer;
            transition: background .1s;
            color: var(--text);
            background: none;
            border: none;
            font-family: 'Inter'
        }

        .n-link:hover {
            background: rgba(255, 255, 255, .08)
        }

        .n-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .n-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer
        }

        .n-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .board-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0
        }

        .bh-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--heading)
        }

        .bh-btn {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: .78rem;
            cursor: pointer;
            border: none;
            font-family: 'Inter';
            transition: all .1s;
            background: rgba(255, 255, 255, .06);
            color: var(--text)
        }

        .bh-btn:hover {
            background: rgba(255, 255, 255, .12)
        }

        .bh-filter {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: .78rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            font-family: 'Inter'
        }

        .bh-filter:hover {
            background: rgba(255, 255, 255, .04)
        }

        .board {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px;
            flex: 1;
            overflow-x: auto;
            align-items: flex-start
        }

        .board::-webkit-scrollbar {
            height: 8px
        }

        .board::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px
        }

        .column {
            min-width: 272px;
            max-width: 272px;
            background: var(--card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 130px)
        }

        .col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px
        }

        .col-title {
            font-weight: 600;
            font-size: .85rem;
            color: var(--heading);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .col-count {
            background: rgba(255, 255, 255, .08);
            padding: 0 6px;
            border-radius: 10px;
            font-size: .7rem;
            font-weight: 600
        }

        .col-add {
            font-size: .85rem;
            cursor: pointer;
            color: var(--muted);
            padding: 4px;
            border-radius: 4px;
            transition: background .1s
        }

        .col-add:hover {
            background: rgba(255, 255, 255, .08)
        }

        .col-cards {
            padding: 0 8px 8px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .col-cards::-webkit-scrollbar {
            width: 4px
        }

        .col-cards::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px
        }

        .card {
            background: #2b3036;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-1px)
        }

        .card-labels {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            flex-wrap: wrap
        }

        .card-label {
            height: 8px;
            width: 40px;
            border-radius: 100px
        }

        .label-green {
            background: var(--green)
        }

        .label-yellow {
            background: var(--yellow)
        }

        .label-red {
            background: var(--red)
        }

        .label-blue {
            background: var(--accent)
        }

        .label-purple {
            background: var(--purple)
        }

        .card-cover {
            width: 100%;
            height: 120px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .card-title {
            font-size: .85rem;
            font-weight: 500;
            color: var(--heading);
            margin-bottom: 6px;
            line-height: 1.3
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: .72rem;
            color: var(--muted)
        }

        .card-badge {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .card-members {
            display: flex;
            margin-left: auto
        }

        .card-member {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            overflow: hidden;
            margin-left: -6px;
            border: 2px solid #2b3036
        }

        .card-member img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .add-card {
            padding: 8px 12px;
            color: var(--muted);
            font-size: .85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            border-radius: 0 0 12px 12px;
            transition: background .1s
        }

        .add-card:hover {
            background: rgba(255, 255, 255, .04);
            color: var(--text)
        }

        .add-form {
            padding: 8px
        }

        .add-form textarea {
            width: 100%;
            padding: 8px;
            background: #2b3036;
            border: none;
            border-radius: 4px;
            color: var(--heading);
            font-size: .85rem;
            outline: none;
            resize: none;
            font-family: 'Inter';
            line-height: 1.3
        }

        .add-form-btns {
            display: flex;
            gap: 4px;
            margin-top: 4px
        }

        .add-form-btn {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: .78rem;
            cursor: pointer;
            border: none;
            font-family: 'Inter';
            font-weight: 600
        }

        .add-form-btn.primary {
            background: var(--accent);
            color: #fff
        }

        .add-form-btn.cancel {
            background: none;
            color: var(--muted)
        }
    </style>
</head>

<body>
    <nav>
        <div class="n-logo">📋 TaskFlow</div>
        <div class="n-links"><button class="n-link">Workspaces</button><button class="n-link">Recent</button><button
                class="n-link">Starred</button><button class="n-link">Templates</button></div>
        <div class="n-right"><span style="font-size:1rem;cursor:pointer">🔔</span>
            <div class="n-avatar"><img src="https://i.pravatar.cc/56?img=11"></div>
        </div>
    </nav>
    <div class="board-header">
        <span class="bh-title">🚀 DevVault Pro Sprint Board</span>
        <button class="bh-btn">⭐ Starred</button>
        <button class="bh-btn">👥 Team</button>
        <button class="bh-filter">🔍 Filter</button>
        <button class="bh-filter">📊 Power-Ups</button>
    </div>
    <div class="board" id="board"></div>

    <script>
        const columns = [
            {
                title: '📋 Backlog', cards: [
                    { title: 'Implement dark mode for email templates', labels: ['blue', 'green'], badges: { comments: 3, attachments: 1 }, members: ['https://i.pravatar.cc/48?img=9'] },
                    { title: 'Add WebSocket support for real-time notifications', labels: ['red'], badges: { comments: 12, due: 'Mar 15' }, members: ['https://i.pravatar.cc/48?img=5', 'https://i.pravatar.cc/48?img=8'] },
                    { title: 'Research: Best practices for API rate limiting', labels: ['purple'], badges: { comments: 2 }, members: ['https://i.pravatar.cc/48?img=1'] },
                ]
            },
            {
                title: '🔨 In Progress', cards: [
                    { title: 'Build interactive ChatGPT clone template', labels: ['green', 'yellow'], cover: 'https://picsum.photos/seed/tr1/544/240', badges: { comments: 8, due: 'Mar 10', check: '3/5' }, members: ['https://i.pravatar.cc/48?img=11', 'https://i.pravatar.cc/48?img=1'] },
                    { title: 'E-commerce backend: Cart + Stripe integration', labels: ['red', 'blue'], badges: { comments: 15, due: 'Mar 12', check: '7/10' }, members: ['https://i.pravatar.cc/48?img=5'] },
                    { title: 'Polish Spotify clone — add real album art', labels: ['green'], badges: { comments: 4 }, members: ['https://i.pravatar.cc/48?img=8'] },
                ]
            },
            {
                title: '👀 Review', cards: [
                    { title: 'Complete auth system with 2FA and RBAC', labels: ['red', 'green'], cover: 'https://picsum.photos/seed/tr2/544/240', badges: { comments: 22, check: '10/10' }, members: ['https://i.pravatar.cc/48?img=9', 'https://i.pravatar.cc/48?img=11'] },
                    { title: '20 developer cheat sheets — final proofread', labels: ['yellow'], badges: { comments: 5, check: '18/20' }, members: ['https://i.pravatar.cc/48?img=1'] },
                ]
            },
            {
                title: '✅ Done', cards: [
                    { title: '55 exclusive UI templates completed', labels: ['green'], badges: { comments: 34 }, members: ['https://i.pravatar.cc/48?img=11', 'https://i.pravatar.cc/48?img=5', 'https://i.pravatar.cc/48?img=1'] },
                    { title: 'AI/LLM toolkit — RAG, agents, streaming', labels: ['blue', 'green'], badges: { comments: 19 }, members: ['https://i.pravatar.cc/48?img=9'] },
                    { title: 'Nginx + Docker production configs', labels: ['purple'], badges: { comments: 6 }, members: ['https://i.pravatar.cc/48?img=8'] },
                ]
            },
        ];

        function render() {
            document.getElementById('board').innerHTML = columns.map((col, ci) => `
    <div class="column">
      <div class="col-header"><span class="col-title">${col.title}<span class="col-count">${col.cards.length}</span></span><span class="col-add" onclick="showAddCard(${ci})">+</span></div>
      <div class="col-cards" id="col${ci}">${col.cards.map((c, cdi) => renderCard(c)).join('')}</div>
      <div class="add-card" id="addBtn${ci}" onclick="showAddCard(${ci})">+ Add a card</div>
      <div class="add-form" id="addForm${ci}" style="display:none"><textarea rows="2" placeholder="Enter a title..." id="addInput${ci}"></textarea><div class="add-form-btns"><button class="add-form-btn primary" onclick="addCard(${ci})">Add card</button><button class="add-form-btn cancel" onclick="hideAddCard(${ci})">✕</button></div></div>
    </div>
  `).join('');
        }

        function renderCard(c) {
            return `<div class="card">${c.cover ? `<div class="card-cover"><img src="${c.cover}" alt="Cover" loading="lazy"></div>` : ''}<div class="card-labels">${c.labels.map(l => `<div class="card-label label-${l}"></div>`).join('')}</div><div class="card-title">${c.title}</div><div class="card-badges">${c.badges.due ? `<span class="card-badge">📅 ${c.badges.due}</span>` : ''}${c.badges.check ? `<span class="card-badge">☑️ ${c.badges.check}</span>` : ''}${c.badges.comments ? `<span class="card-badge">💬 ${c.badges.comments}</span>` : ''}${c.badges.attachments ? `<span class="card-badge">📎 ${c.badges.attachments}</span>` : ''}<div class="card-members">${c.members.map(m => `<div class="card-member"><img src="${m}" alt="Member"></div>`).join('')}</div></div></div>`;
        }

        function showAddCard(ci) { document.getElementById('addBtn' + ci).style.display = 'none'; document.getElementById('addForm' + ci).style.display = 'block'; document.getElementById('addInput' + ci).focus() }
        function hideAddCard(ci) { document.getElementById('addBtn' + ci).style.display = 'flex'; document.getElementById('addForm' + ci).style.display = 'none' }
        function addCard(ci) {
            const input = document.getElementById('addInput' + ci);
            if (!input.value.trim()) return;
            columns[ci].cards.push({ title: input.value, labels: ['blue'], badges: { comments: 0 }, members: ['https://i.pravatar.cc/48?img=11'] });
            input.value = ''; render();
        }

        render();
    </script>
</body>

</html>
