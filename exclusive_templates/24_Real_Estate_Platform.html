<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstatePro — Property Listings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #09090b;
            --card: #111115;
            --border: rgba(255, 255, 255, 0.06);
            --accent: #10b981;
            --text: #fafafa;
            --muted: #71717a
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text)
        }

        nav {
            padding: 1rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(12px);
            z-index: 50
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer
        }

        .nav-logo span {
            color: var(--accent)
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            font-size: .88rem;
            color: var(--muted)
        }

        .nav-links a {
            cursor: pointer;
            transition: color .15s;
            text-decoration: none;
            color: inherit
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text)
        }

        .n-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer
        }

        .n-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .hero {
            padding: 3rem;
            text-align: center
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: .5rem
        }

        .hero p {
            color: var(--muted);
            margin-bottom: 2rem
        }

        .search-bar {
            display: flex;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
            padding: 8px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border)
        }

        .search-bar input,
        .search-bar select {
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: .88rem;
            outline: none;
            font-family: 'Inter';
            flex: 1
        }

        .search-bar button {
            padding: 12px 28px;
            border-radius: 8px;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Inter';
            transition: opacity .1s
        }

        .search-bar button:hover {
            opacity: .9
        }

        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap
        }

        .filter-chip {
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: .82rem;
            cursor: pointer;
            background: none;
            color: var(--muted);
            font-family: 'Inter';
            transition: all .12s
        }

        .filter-chip.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600
        }

        .filter-chip:hover:not(.active) {
            border-color: var(--muted)
        }

        .listings {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 0 3rem 3rem;
            max-width: 1200px;
            margin: 0 auto
        }

        .listing {
            border-radius: 12px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .3s
        }

        .listing:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3)
        }

        .l-img {
            aspect-ratio: 16/10;
            position: relative;
            overflow: hidden
        }

        .l-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .3s
        }

        .listing:hover .l-img img {
            transform: scale(1.05)
        }

        .l-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 700
        }

        .l-badge-new {
            background: var(--accent);
            color: #000
        }

        .l-badge-hot {
            background: #ef4444;
            color: #fff
        }

        .l-fav {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .9rem;
            transition: transform .12s;
            z-index: 2
        }

        .l-fav:hover {
            transform: scale(1.1)
        }

        .l-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px
        }

        .l-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .4)
        }

        .l-dot.active {
            background: #fff
        }

        .l-info {
            padding: 1rem
        }

        .l-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent)
        }

        .l-address {
            font-size: .88rem;
            font-weight: 500;
            margin-top: 2px
        }

        .l-city {
            font-size: .82rem;
            color: var(--muted);
            margin-bottom: .8rem
        }

        .l-features {
            display: flex;
            gap: 1rem;
            font-size: .82rem;
            color: var(--muted);
            padding-top: .8rem;
            border-top: 1px solid var(--border)
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: .75rem;
            color: var(--muted);
            border-top: 1px solid var(--border)
        }

        @media(max-width:768px) {
            .listings {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-logo">🏠 Estate<span>Pro</span></div>
        <div class="nav-links"><a class="active">Buy</a><a>Rent</a><a>Sell</a><a>Agents</a></div>
        <div class="n-avatar"><img src="https://i.pravatar.cc/64?img=11"></div>
    </nav>
    <section class="hero">
        <h1>Find Your Dream Home</h1>
        <p>Browse 12,000+ verified properties across 200+ cities</p>
        <div class="search-bar"><input placeholder="🔍 City, neighborhood, or address..."><select>
                <option>All Types</option>
                <option>House</option>
                <option>Apartment</option>
            </select><select>
                <option>Any Price</option>
                <option>$100K-$500K</option>
                <option>$500K-$1M</option>
                <option>$1M+</option>
            </select><button onclick="alert('🔍 Searching...')">Search</button></div>
        <div class="filters" id="filters"></div>
    </section>
    <div class="listings" id="listings"></div>
    <footer>© 2026 EstatePro — Built with DevVault Pro Templates</footer>

    <script>
        const filters = ['All', '🏠 Houses', '🏢 Apartments', '🏡 Condos', '💰 Reduced'];
        const properties = [
            { price: '$485,000', address: '742 Evergreen Terrace', city: 'Springfield, IL', beds: 4, bath: 3, sqft: '2,400', img: 'https://picsum.photos/seed/re1/640/400', badge: 'New' },
            { price: '$2,200/mo', address: '221B Baker Street', city: 'Brooklyn, NY', beds: 2, bath: 1, sqft: '950', img: 'https://picsum.photos/seed/re2/640/400', badge: 'Hot' },
            { price: '$329,000', address: '1640 Riverside Dr', city: 'Austin, TX', beds: 3, bath: 2, sqft: '1,800', img: 'https://picsum.photos/seed/re3/640/400', fav: true },
            { price: '$1,250,000', address: '10880 Malibu Point', city: 'Malibu, CA', beds: 5, bath: 4, sqft: '4,200', img: 'https://picsum.photos/seed/re4/640/400', badge: 'New' },
            { price: '$3,500/mo', address: '350 Fifth Avenue', city: 'Manhattan, NY', beds: 3, bath: 2, sqft: '1,400', img: 'https://picsum.photos/seed/re5/640/400' },
            { price: '$567,000', address: '31 Spooner Street', city: 'Denver, CO', beds: 4, bath: 3, sqft: '2,800', img: 'https://picsum.photos/seed/re6/640/400', badge: 'Hot' },
        ];

        let activeFilter = 0;
        document.getElementById('filters').innerHTML = filters.map((f, i) => `<button class="filter-chip${i === 0 ? ' active' : ''}" onclick="activeFilter=${i};renderFilters()">${f}</button>`).join('');
        function renderFilters() { document.querySelectorAll('.filter-chip').forEach((c, i) => c.classList.toggle('active', i === activeFilter)) }

        document.getElementById('listings').innerHTML = properties.map(p => `
  <div class="listing">
    <div class="l-img"><img src="${p.img}" alt="${p.address}" loading="lazy">${p.badge ? `<span class="l-badge l-badge-${p.badge.toLowerCase()}">${p.badge}</span>` : ''}<span class="l-fav" onclick="event.stopPropagation();this.textContent=this.textContent==='🤍'?'❤️':'🤍'">${p.fav ? '❤️' : '🤍'}</span></div>
    <div class="l-info"><div class="l-price">${p.price}</div><div class="l-address">${p.address}</div><div class="l-city">${p.city}</div><div class="l-features"><span>🛏 ${p.beds} Beds</span><span>🛁 ${p.bath} Bath</span><span>📐 ${p.sqft} sqft</span></div></div>
  </div>
`).join('');
    </script>
</body>

</html>
