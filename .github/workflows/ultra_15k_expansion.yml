name: "Ultra 15K Expansion (ALL tiers + fresh)"

on:
  workflow_dispatch:
    inputs:
      fresh:
        description: "Reset cache to re-download everything"
        required: false
        type: boolean
        default: true

jobs:
  # ==== FASE 1: Cleanup + GitHub Repos + Releases ====
  tier1-github:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests tqdm

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          rclone listremotes

      - name: Download cache from Drive
        run: |
          mkdir -p /tmp/ir_repository
          rclone copy gdrive2:IR_DEF_REPOSITORY/.download_cache.json /tmp/ir_repository/ 2>/dev/null || true

      - name: "Cleanup: Remove junk from Drive"
        run: |
          echo "=== BEFORE CLEANUP ==="
          rclone size gdrive2:IR_DEF_REPOSITORY || true
          python scripts/mega_download.py --tier cleanup --output-dir /tmp/ir_repository
          echo "=== AFTER CLEANUP ==="
          rclone size gdrive2:IR_DEF_REPOSITORY || true

      - name: "Download 100+ GitHub repos"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FRESH=""
          if [ "${{ inputs.fresh }}" = "true" ]; then FRESH="--fresh"; fi
          python scripts/mega_download.py --tier github --output-dir /tmp/ir_repository $FRESH

      - name: "Download GitHub releases"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/mega_download.py --tier releases --output-dir /tmp/ir_repository

      - name: Stats
        if: always()
        run: |
          echo "=== File count by category ==="
          for d in /tmp/ir_repository/*/; do
            [ -d "$d" ] && echo "$(basename $d): $(find $d -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)"
          done
          echo "=== TOTAL ==="
          find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l

      - name: "Upload to Drive"
        if: always()
        run: |
          rclone copy /tmp/ir_repository gdrive2:IR_DEF_REPOSITORY \
            --transfers 8 --checkers 16 --drive-chunk-size 64M \
            --fast-list --stats 30s --log-level INFO --stats-one-line \
            --exclude ".*" --exclude "*.log" --exclude "*.json" --exclude "*.md"

      - name: Verify
        if: always()
        run: |
          rclone size gdrive2:IR_DEF_REPOSITORY || true

  # ==== FASE 2: Direct ZIPs (50+ sources) ====
  tier2-direct:
    needs: [tier1-github]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests tqdm

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Download cache
        run: |
          mkdir -p /tmp/ir_repository
          rclone copy gdrive2:IR_DEF_REPOSITORY/.download_cache.json /tmp/ir_repository/ 2>/dev/null || true

      - name: "Download 50+ direct ZIPs"
        run: |
          python scripts/mega_download.py --tier direct --output-dir /tmp/ir_repository

      - name: Stats
        if: always()
        run: |
          find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l

      - name: "Upload to Drive"
        if: always()
        run: |
          rclone copy /tmp/ir_repository gdrive2:IR_DEF_REPOSITORY \
            --transfers 8 --checkers 16 --drive-chunk-size 64M \
            --fast-list --stats 30s --log-level INFO --stats-one-line \
            --exclude ".*" --exclude "*.log" --exclude "*.json" --exclude "*.md"

  # ==== FASE 3: Search Discovery + ToneHunt ====
  tier3-search:
    needs: [tier2-direct]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests tqdm

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Download cache
        run: |
          mkdir -p /tmp/ir_repository
          rclone copy gdrive2:IR_DEF_REPOSITORY/.download_cache.json /tmp/ir_repository/ 2>/dev/null || true

      - name: "GitHub Search auto-discovery"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/mega_download.py --tier search --output-dir /tmp/ir_repository

      - name: "ToneHunt + Massive expansion packs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FRESH=""
          if [ "${{ inputs.fresh }}" = "true" ]; then FRESH="--fresh"; fi
          python scripts/mega_download.py --tier tier3 --output-dir /tmp/ir_repository $FRESH

      - name: "Upload to Drive"
        if: always()
        run: |
          rclone copy /tmp/ir_repository gdrive2:IR_DEF_REPOSITORY \
            --transfers 8 --checkers 16 --drive-chunk-size 64M \
            --fast-list --stats 30s --log-level INFO --stats-one-line \
            --exclude ".*" --exclude "*.log" --exclude "*.json" --exclude "*.md"

      - name: "Final cleanup on Drive"
        if: always()
        run: |
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.json" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.log" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.txt" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.py" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.md" || true
          rclone rmdirs gdrive2:IR_DEF_REPOSITORY || true

      - name: "FINAL REPORT"
        if: always()
        run: |
          echo "=========================================="
          echo "IR DEF REPOSITORY — FINAL STATE"
          echo "=========================================="
          rclone size gdrive2:IR_DEF_REPOSITORY || true
          echo "------------------------------------------"
          for d in $(rclone lsd gdrive2:IR_DEF_REPOSITORY 2>/dev/null | awk '{print $NF}'); do
            count=$(rclone ls "gdrive2:IR_DEF_REPOSITORY/$d" 2>/dev/null | wc -l)
            size=$(rclone size "gdrive2:IR_DEF_REPOSITORY/$d" 2>/dev/null | grep "Total size" | awk '{print $3, $4}')
            echo "$d: $count files ($size)"
          done
          echo "=========================================="
