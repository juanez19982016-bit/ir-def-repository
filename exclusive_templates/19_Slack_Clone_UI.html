<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamChat — Workspace Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #1a1d21;
            --sidebar: #19171d;
            --workspace: #4a154b;
            --channel: #222529;
            --text: #d1d2d3;
            --muted: #9a9b9d;
            --border: #35373b;
            --accent: #1264a3;
            --green: #2bac76;
            --hover: rgba(255, 255, 255, .04)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden
        }

        .ws-bar {
            width: 64px;
            background: var(--workspace);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 8px
        }

        .ws-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-radius .2s;
            opacity: .6
        }

        .ws-icon:hover,
        .ws-icon.active {
            opacity: 1;
            border-radius: 12px
        }

        .ws-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .ws-add {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, .5);
            font-size: .9rem;
            transition: all .12s
        }

        .ws-add:hover {
            border-color: #fff;
            color: #fff
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .s-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            cursor: pointer
        }

        .s-name {
            font-weight: 900;
            font-size: 1rem;
            color: #fff
        }

        .s-pencil {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            cursor: pointer;
            transition: background .1s
        }

        .s-pencil:hover {
            background: rgba(255, 255, 255, .2)
        }

        .s-nav {
            padding: 8px 0
        }

        .s-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 16px;
            font-size: .88rem;
            cursor: pointer;
            transition: background .08s;
            color: var(--muted)
        }

        .s-link:hover {
            background: var(--hover)
        }

        .s-link.active {
            background: rgba(18, 100, 163, .3);
            color: #fff
        }

        .s-section {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px 2px;
            font-size: .78rem;
            color: var(--muted);
            cursor: pointer;
            font-weight: 500
        }

        .s-section:hover {
            color: var(--text)
        }

        .ch-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 16px 3px 24px;
            font-size: .85rem;
            cursor: pointer;
            transition: background .08s;
            color: var(--muted)
        }

        .ch-link:hover {
            background: var(--hover);
            color: var(--text)
        }

        .ch-link.active {
            background: rgba(18, 100, 163, .3);
            color: #fff;
            font-weight: 500
        }

        .ch-link.unread {
            color: #fff;
            font-weight: 600
        }

        .ch-badge {
            margin-left: auto;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: .65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700
        }

        .dm-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 16px 4px 24px;
            font-size: .85rem;
            cursor: pointer;
            transition: background .08s;
            color: var(--muted)
        }

        .dm-link:hover {
            background: var(--hover);
            color: var(--text)
        }

        .dm-av {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0
        }

        .dm-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .dm-status {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 2px solid var(--sidebar)
        }

        .dm-status.online {
            background: var(--green)
        }

        .dm-status.away {
            background: #e8912d
        }

        .dm-status.offline {
            background: transparent;
            border-color: var(--muted)
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column
        }

        .ch-header {
            padding: 8px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .ch-title {
            font-weight: 700;
            font-size: .95rem;
            color: #fff
        }

        .ch-topic {
            font-size: .78rem;
            color: var(--muted);
            border-left: 1px solid var(--border);
            padding-left: 8px;
            margin-left: 4px
        }

        .ch-header-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            color: var(--muted);
            font-size: .9rem
        }

        .ch-header-right span {
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background .1s
        }

        .ch-header-right span:hover {
            background: var(--hover)
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .messages::-webkit-scrollbar {
            width: 4px
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .06);
            border-radius: 2px
        }

        .msg-group {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            margin-top: 8px
        }

        .msg-group:hover {
            background: var(--hover);
            border-radius: 4px
        }

        .mg-av {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            margin-top: 2px
        }

        .mg-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .mg-header {
            display: flex;
            align-items: baseline;
            gap: 6px
        }

        .mg-name {
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer
        }

        .mg-name:hover {
            text-decoration: underline
        }

        .mg-time {
            font-size: .72rem;
            color: var(--muted)
        }

        .mg-text {
            font-size: .88rem;
            line-height: 1.5;
            margin-top: 2px
        }

        .mg-text code {
            background: rgba(255, 255, 255, .06);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: .82rem;
            font-family: monospace
        }

        .mg-react {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 100px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: .78rem;
            margin-top: 4px;
            transition: border-color .1s
        }

        .mg-react:hover {
            border-color: var(--accent);
            background: rgba(18, 100, 163, .08)
        }

        .msg-date {
            text-align: center;
            margin: 12px 0;
            position: relative
        }

        .msg-date::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: var(--border)
        }

        .msg-date span {
            background: var(--bg);
            padding: 0 12px;
            font-size: .72rem;
            color: var(--muted);
            position: relative;
            font-weight: 600
        }

        .compose {
            padding: 0 20px 16px
        }

        .compose-box {
            background: var(--channel);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden
        }

        .compose-box textarea {
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text);
            font-size: .88rem;
            outline: none;
            resize: none;
            font-family: 'Inter';
            line-height: 1.4
        }

        .compose-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-top: 1px solid var(--border)
        }

        .compose-toolbar span {
            padding: 4px 6px;
            cursor: pointer;
            font-size: .85rem;
            border-radius: 4px;
            transition: background .1s;
            color: var(--muted)
        }

        .compose-toolbar span:hover {
            background: var(--hover)
        }

        .compose-send {
            margin-left: auto;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: .7rem;
            transition: all .1s;
            opacity: .5
        }

        .compose-send.active {
            opacity: 1
        }

        .compose-send:hover {
            background: #1077c0
        }
    </style>
</head>

<body>
    <div class="ws-bar">
        <div class="ws-icon active"><img src="https://picsum.photos/seed/ws1/72/72" alt="Workspace"></div>
        <div class="ws-icon"><img src="https://picsum.photos/seed/ws2/72/72" alt="Workspace"></div>
        <div class="ws-icon"><img src="https://picsum.photos/seed/ws3/72/72" alt="Workspace"></div>
        <div class="ws-add">+</div>
    </div>
    <div class="sidebar">
        <div class="s-header"><span class="s-name">DevTeam HQ</span><span class="s-pencil">✏️</span></div>
        <div class="s-nav">
            <div class="s-link" onclick="setLink(this)"><span>💬</span>Threads</div>
            <div class="s-link" onclick="setLink(this)"><span>📨</span>Drafts & Sent</div>
            <div class="s-link" onclick="setLink(this)"><span>🔖</span>Saved items</div>
        </div>
        <div class="s-section"
            onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            ▾ Channels</div>
        <div>
            <div class="ch-link active" onclick="setCh(this)"><span>#</span>general</div>
            <div class="ch-link unread" onclick="setCh(this)"><span>#</span>frontend<span class="ch-badge">5</span>
            </div>
            <div class="ch-link" onclick="setCh(this)"><span>#</span>backend</div>
            <div class="ch-link unread" onclick="setCh(this)"><span>#</span>design<span class="ch-badge">2</span></div>
            <div class="ch-link" onclick="setCh(this)"><span>#</span>devops</div>
            <div class="ch-link" onclick="setCh(this)"><span>#</span>random</div>
        </div>
        <div class="s-section">▾ Direct messages</div>
        <div>
            <div class="dm-link" onclick="setLink(this)">
                <div class="dm-av"><img src="https://i.pravatar.cc/40?img=1">
                    <div class="dm-status online"></div>
                </div>Sarah Chen
            </div>
            <div class="dm-link" onclick="setLink(this)">
                <div class="dm-av"><img src="https://i.pravatar.cc/40?img=5">
                    <div class="dm-status online"></div>
                </div>Alex Rivera
            </div>
            <div class="dm-link" onclick="setLink(this)">
                <div class="dm-av"><img src="https://i.pravatar.cc/40?img=9">
                    <div class="dm-status away"></div>
                </div>Emma Wilson
            </div>
            <div class="dm-link" onclick="setLink(this)">
                <div class="dm-av"><img src="https://i.pravatar.cc/40?img=8">
                    <div class="dm-status offline"></div>
                </div>Tom King
            </div>
        </div>
    </div>
    <div class="main">
        <div class="ch-header"><span class="ch-title"># general</span><span class="ch-topic">Company-wide updates and
                announcements</span>
            <div class="ch-header-right"><span>📞</span><span>📌</span><span>🔍</span><span>👤</span></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="compose">
            <div class="compose-box">
                <textarea rows="1" placeholder="Message #general" id="msgInput"
                    oninput="document.querySelector('.compose-send').classList.toggle('active',this.value.length>0)"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                <div class="compose-toolbar">
                    <span>➕</span><span>📎</span><span>😊</span><span>@</span><span>📝</span><span>🎧</span><button
                        class="compose-send" onclick="sendMsg()">➤</button></div>
            </div>
        </div>
    </div>

    <script>
        const msgs = [
            { date: 'Tuesday, March 4, 2026' },
            { name: 'Sarah Chen', avatar: 'https://i.pravatar.cc/72?img=1', time: '9:15 AM', texts: ['Good morning team! 🌅', 'Just pushed the new design system to staging. Check it out when you get a chance.'], reacts: ['🎉 3', '👀 2'] },
            { name: 'Alex Rivera', avatar: 'https://i.pravatar.cc/72?img=5', time: '9:32 AM', texts: ['Looks amazing @Sarah! The glassmorphism components are 🔥', 'Quick question — are the `dark:` variants ready?'] },
            { name: 'Sarah Chen', avatar: 'https://i.pravatar.cc/72?img=1', time: '9:45 AM', texts: ['Yes! Full dark mode support. Used CSS variables so it switches instantly.'] },
            { date: 'Today' },
            { name: 'Tom King', avatar: 'https://i.pravatar.cc/72?img=8', time: '10:02 AM', texts: ['Heads up: deploying v2.4.0 at noon today. Here\'s the changelog:', '• New auth system with 2FA\n• WebSocket real-time notifications\n• Performance improvements (30% faster)'], reacts: ['🚀 5', '👏 4'] },
            { name: 'Emma Wilson', avatar: 'https://i.pravatar.cc/72?img=9', time: '10:15 AM', texts: ['The new auth flow looks great! Tested it this morning — smooth as butter 🧈'] },
            { name: 'Alex Rivera', avatar: 'https://i.pravatar.cc/72?img=5', time: '10:30 AM', texts: ['Speaking of auth, has anyone tried the DevVault Pro auth system? Their `10_complete_auth_system.ts` has everything built in — 2FA, RBAC, sessions, the works.'], reacts: ['💯 2'] },
        ];

        function renderMsgs() {
            document.getElementById('messages').innerHTML = msgs.map(m => {
                if (m.date) return `<div class="msg-date"><span>${m.date}</span></div>`;
                return `<div class="msg-group"><div class="mg-av"><img src="${m.avatar}" alt="${m.name}"></div><div><div class="mg-header"><span class="mg-name">${m.name}</span><span class="mg-time">${m.time}</span></div>${m.texts.map(t => `<div class="mg-text">${t.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/@(\w+)/g, '<span style="color:#1264a3;background:rgba(18,100,163,.1);padding:1px 3px;border-radius:3px;cursor:pointer">@$1</span>').replace(/\n/g, '<br>')}</div>`).join('')}${m.reacts ? m.reacts.map(r => `<span class="mg-react" onclick="bumpReact(this)">${r}</span>`).join(' ') : ''}</div></div>`;
            }).join('');
            const el = document.getElementById('messages');
            el.scrollTop = el.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            const now = new Date();
            msgs.push({ name: 'John Dev', avatar: 'https://i.pravatar.cc/72?img=11', time: now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }), texts: [input.value] });
            input.value = ''; renderMsgs();
        }

        function bumpReact(el) {
            const parts = el.textContent.trim().split(' ');
            const count = parseInt(parts[parts.length - 1]) + 1;
            parts[parts.length - 1] = count;
            el.textContent = parts.join(' ');
            el.style.borderColor = 'var(--accent)'; el.style.background = 'rgba(18,100,163,.08)';
        }

        function setLink(el) { document.querySelectorAll('.s-link,.dm-link').forEach(l => l.classList.remove('active')); el.classList.add('active') }
        function setCh(el) { document.querySelectorAll('.ch-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); el.classList.remove('unread'); const b = el.querySelector('.ch-badge'); if (b) b.remove() }

        renderMsgs();
    </script>
</body>

</html>
