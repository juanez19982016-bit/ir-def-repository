<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalendarPro — Schedule Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #111;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --muted: #777;
            --accent: #3b82f6;
            --green: #22c55e;
            --purple: #8b5cf6;
            --red: #ef4444;
            --yellow: #eab308;
            --today: rgba(59, 130, 246, .15)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden
        }

        .sidebar {
            width: 240px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            flex-shrink: 0
        }

        .s-logo {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .s-new-btn {
            padding: 10px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            text-align: center;
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            margin-bottom: 16px;
            border: none;
            width: 100%;
            font-family: 'Inter';
            transition: opacity .1s
        }

        .s-new-btn:hover {
            opacity: .9
        }

        .mini-cal {
            margin-bottom: 16px
        }

        .mc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: .82rem;
            font-weight: 600
        }

        .mc-nav {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background .1s;
            color: var(--muted)
        }

        .mc-nav:hover {
            background: rgba(255, 255, 255, .06)
        }

        .mc-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
            font-size: .72rem
        }

        .mc-day-header {
            color: var(--muted);
            font-weight: 600;
            padding: 2px 0
        }

        .mc-day {
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: background .1s;
            color: var(--muted)
        }

        .mc-day:hover {
            background: rgba(255, 255, 255, .06)
        }

        .mc-day.current {
            background: var(--accent);
            color: #fff;
            font-weight: 700
        }

        .mc-day.other {
            opacity: .3
        }

        .s-section {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--muted);
            font-weight: 600;
            margin: 12px 0 6px
        }

        .s-cal {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: .82rem;
            cursor: pointer
        }

        .s-cal-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .main-header {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px
        }

        .mh-today {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text);
            font-size: .82rem;
            cursor: pointer;
            font-family: 'Inter';
            font-weight: 500;
            transition: background .1s
        }

        .mh-today:hover {
            background: rgba(255, 255, 255, .04)
        }

        .mh-nav {
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            color: var(--muted);
            transition: background .1s
        }

        .mh-nav:hover {
            background: rgba(255, 255, 255, .06)
        }

        .mh-title {
            font-size: 1.1rem;
            font-weight: 700;
            flex: 1
        }

        .mh-views {
            display: flex;
            gap: 4px
        }

        .mh-view {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: .78rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            font-family: 'Inter';
            transition: all .1s
        }

        .mh-view.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .mh-view:hover:not(.active) {
            background: rgba(255, 255, 255, .04)
        }

        .week-header {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

        .wh-time {
            padding: 8px;
            font-size: .7rem;
            color: var(--muted)
        }

        .wh-day {
            padding: 8px;
            text-align: center;
            border-left: 1px solid var(--border)
        }

        .wh-day-name {
            font-size: .7rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase
        }

        .wh-day-num {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 2px
        }

        .wh-day.today .wh-day-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2px auto 0
        }

        .week-grid {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            flex: 1;
            overflow-y: auto
        }

        .week-grid::-webkit-scrollbar {
            width: 4px
        }

        .week-grid::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px
        }

        .time-slot {
            padding: 4px 8px;
            font-size: .65rem;
            color: var(--muted);
            text-align: right;
            height: 60px;
            border-bottom: 1px solid var(--border)
        }

        .day-col {
            border-left: 1px solid var(--border);
            position: relative
        }

        .day-col .hour-line {
            height: 60px;
            border-bottom: 1px solid var(--border)
        }

        .day-col.today {
            background: var(--today)
        }

        .event {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: .7rem;
            cursor: pointer;
            overflow: hidden;
            transition: opacity .12s;
            z-index: 2;
            font-weight: 500
        }

        .event:hover {
            opacity: .85
        }

        .event-blue {
            background: rgba(59, 130, 246, .2);
            border-left: 3px solid var(--accent);
            color: var(--accent)
        }

        .event-green {
            background: rgba(34, 197, 94, .2);
            border-left: 3px solid var(--green);
            color: var(--green)
        }

        .event-purple {
            background: rgba(139, 92, 246, .2);
            border-left: 3px solid var(--purple);
            color: var(--purple)
        }

        .event-red {
            background: rgba(239, 68, 68, .2);
            border-left: 3px solid var(--red);
            color: var(--red)
        }

        .event-yellow {
            background: rgba(234, 179, 8, .2);
            border-left: 3px solid var(--yellow);
            color: var(--yellow)
        }

        .now-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--red);
            z-index: 3
        }

        .now-dot {
            position: absolute;
            left: -4px;
            top: -3px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red)
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="s-logo">📅 CalendarPro</div>
        <button class="s-new-btn" onclick="addEvent()">+ New Event</button>
        <div class="mini-cal">
            <div class="mc-header"><span class="mc-nav" onclick="changeMonth(-1)">‹</span><span id="miniMonth">March
                    2026</span><span class="mc-nav" onclick="changeMonth(1)">›</span></div>
            <div class="mc-grid" id="miniGrid"></div>
        </div>
        <div class="s-section">My Calendars</div>
        <div class="s-cal">
            <div class="s-cal-dot" style="background:var(--accent)"></div>Work
        </div>
        <div class="s-cal">
            <div class="s-cal-dot" style="background:var(--green)"></div>Personal
        </div>
        <div class="s-cal">
            <div class="s-cal-dot" style="background:var(--purple)"></div>Meetings
        </div>
        <div class="s-cal">
            <div class="s-cal-dot" style="background:var(--red)"></div>Deadlines
        </div>
        <div class="s-cal">
            <div class="s-cal-dot" style="background:var(--yellow)"></div>Reminders
        </div>
    </div>
    <div class="main">
        <div class="main-header">
            <button class="mh-today" onclick="goToday()">Today</button>
            <span class="mh-nav" onclick="changeWeek(-1)">‹</span><span class="mh-nav" onclick="changeWeek(1)">›</span>
            <span class="mh-title" id="weekTitle">March 3 – 9, 2026</span>
            <div class="mh-views"><button class="mh-view" onclick="setView(this)">Day</button><button
                    class="mh-view active" onclick="setView(this)">Week</button><button class="mh-view"
                    onclick="setView(this)">Month</button></div>
        </div>
        <div class="week-header" id="weekHeader"></div>
        <div class="week-grid" id="weekGrid"></div>
    </div>

    <script>
        const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const events = [
            { day: 1, start: 9, duration: 1.5, title: 'Team Standup', color: 'blue' },
            { day: 1, start: 14, duration: 2, title: 'Sprint Planning', color: 'purple' },
            { day: 2, start: 10, duration: 1, title: 'Design Review', color: 'green' },
            { day: 2, start: 15, duration: 1, title: '1:1 with Manager', color: 'blue' },
            { day: 3, start: 9, duration: 1.5, title: 'Team Standup', color: 'blue' },
            { day: 3, start: 11, duration: 2, title: 'Code Review Session', color: 'purple' },
            { day: 3, start: 16, duration: 1, title: 'Deadline: Auth System', color: 'red' },
            { day: 4, start: 10, duration: 1.5, title: 'Product Demo', color: 'green' },
            { day: 4, start: 13, duration: 1, title: 'Lunch & Learn', color: 'yellow' },
            { day: 5, start: 9, duration: 1.5, title: 'Team Standup', color: 'blue' },
            { day: 5, start: 14, duration: 2, title: 'Sprint Retro', color: 'purple' },
        ];

        const today = new Date();
        const todayDow = today.getDay();

        function renderMiniCal() {
            const year = 2026, month = 2;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = dayNames.map(d => `<div class="mc-day-header">${d[0]}</div>`).join('');
            for (let i = 0; i < firstDay; i++)html += `<div class="mc-day other">${new Date(year, month, 0).getDate() - firstDay + i + 1}</div>`;
            for (let d = 1; d <= daysInMonth; d++)html += `<div class="mc-day${d === 5 ? ' current' : ''}">${d}</div>`;
            document.getElementById('miniGrid').innerHTML = html;
        }

        function renderWeek() {
            const startDate = new Date(2026, 2, 3);
            let headerHtml = '<div class="wh-time"></div>';
            for (let d = 0; d < 7; d++) {
                const date = new Date(startDate); date.setDate(date.getDate() + d);
                const isToday = d === 2;
                headerHtml += `<div class="wh-day${isToday ? ' today' : ''}"><div class="wh-day-name">${dayNames[d]}</div><div class="wh-day-num">${date.getDate()}</div></div>`;
            }
            document.getElementById('weekHeader').innerHTML = headerHtml;

            let gridHtml = '';
            for (let h = 7; h <= 21; h++) {
                gridHtml += `<div class="time-slot">${h > 12 ? h - 12 : h}${h >= 12 ? 'PM' : 'AM'}</div>`;
                for (let d = 0; d < 7; d++) {
                    const isToday = d === 2;
                    let cellHtml = `<div class="day-col${isToday ? ' today' : ''}">`;
                    cellHtml += `<div class="hour-line"></div>`;
                    events.filter(e => e.day === d && Math.floor(e.start) === h).forEach(e => {
                        const top = (e.start - h) * 60;
                        cellHtml += `<div class="event event-${e.color}" style="top:${top}px;height:${e.duration * 60 - 4}px" onclick="alert('📅 ${e.title}')">${e.title}</div>`;
                    });
                    if (isToday && h === Math.floor(new Date().getHours() || 13)) {
                        const mins = (new Date().getMinutes() || 30) / 60 * 60;
                        cellHtml += `<div class="now-line" style="top:${mins}px"><div class="now-dot"></div></div>`;
                    }
                    cellHtml += `</div>`;
                    gridHtml += cellHtml;
                }
            }
            document.getElementById('weekGrid').innerHTML = gridHtml;
        }

        function addEvent() {
            const title = prompt('Event title:');
            if (!title) return;
            events.push({ day: 2, start: 12, duration: 1, title: title, color: 'green' });
            renderWeek();
        }
        function goToday() { }
        function changeMonth() { }
        function changeWeek() { }
        function setView(el) { document.querySelectorAll('.mh-view').forEach(v => v.classList.remove('active')); el.classList.add('active') }

        renderMiniCal(); renderWeek();
        // Auto-scroll to 8AM
        setTimeout(() => { const g = document.getElementById('weekGrid'); g.scrollTop = 60 }, 100);
    </script>
</body>

</html>
