name: "Sub-Categorize Google Drive"

on:
  workflow_dispatch:

jobs:
  organize-drive:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          rclone listremotes
          
      - name: "📂 Run Sub-Categorizer Script"
        run: |
          python scripts/organize_subfolders.py
          
      - name: "🌳 Mostrar Árbol de Carpetas"
        if: always()
        run: |
          echo "=== 01_GABINETES_IRs_GUITARRA ==="
          rclone lsd gdrive2:IR_DEF_REPOSITORY/01_GABINETES_IRs_GUITARRA || true
          echo ""
          echo "=== 04_PRESETS_MULTI_EFECTOS ==="
          rclone lsd gdrive2:IR_DEF_REPOSITORY/04_PRESETS_MULTI_EFECTOS || true
