<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignTool — Collaborative Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #2c2c2c;
            --panel: #2c2c2c;
            --canvas: #1e1e1e;
            --text: #fff;
            --muted: #999;
            --accent: #0d99ff;
            --border: #444;
            --green: #14ae5c;
            --red: #f24822;
            --yellow: #ffcd29;
            --purple: #a259ff
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none
        }

        .toolbar {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: #333;
            border-bottom: 1px solid var(--border);
            height: 40px;
            flex-shrink: 0;
            gap: 8px
        }

        .tb-logo {
            font-weight: 800;
            font-size: .85rem;
            color: var(--accent);
            cursor: pointer;
            margin-right: 8px
        }

        .tb-sep {
            width: 1px;
            height: 20px;
            background: var(--border)
        }

        .tb-tools {
            display: flex;
            gap: 2px
        }

        .tb-tool {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: .85rem;
            transition: all .1s;
            border: none;
            background: none;
            color: var(--text)
        }

        .tb-tool:hover {
            background: rgba(255, 255, 255, .08)
        }

        .tb-tool.active {
            background: var(--accent);
            color: #fff
        }

        .tb-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: .78rem
        }

        .tb-avatars {
            display: flex;
            margin-left: 8px
        }

        .tb-av {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            overflow: hidden;
            margin-left: -6px;
            border: 2px solid #333
        }

        .tb-av img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .tb-share {
            padding: 4px 12px;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: .75rem;
            cursor: pointer;
            border: none;
            font-family: 'Inter'
        }

        .tb-share:hover {
            opacity: .9
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .layers {
            width: 240px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .layers-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border)
        }

        .layers-title {
            font-size: .82rem;
            font-weight: 600
        }

        .layers-icons {
            display: flex;
            gap: 4px
        }

        .layers-tabs {
            display: flex;
            border-bottom: 1px solid var(--border)
        }

        .layers-tab {
            flex: 1;
            padding: 6px;
            text-align: center;
            font-size: .72rem;
            cursor: pointer;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            transition: all .1s
        }

        .layers-tab.active {
            color: var(--text);
            border-color: var(--accent)
        }

        .layer {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            cursor: pointer;
            transition: background .08s;
            font-size: .78rem;
            color: var(--muted)
        }

        .layer:hover {
            background: rgba(255, 255, 255, .04)
        }

        .layer.selected {
            background: rgba(13, 153, 255, .15);
            color: var(--text)
        }

        .layer-icon {
            width: 14px;
            text-align: center;
            font-size: .7rem
        }

        .layer-vis {
            margin-left: auto;
            font-size: .6rem;
            cursor: pointer;
            opacity: .5;
            transition: opacity .1s
        }

        .layer-vis:hover {
            opacity: 1
        }

        .canvas {
            flex: 1;
            background: var(--canvas);
            position: relative;
            overflow: hidden;
            cursor: crosshair
        }

        .canvas-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, .05) 1px, transparent 1px);
            background-size: 20px 20px
        }

        .design-el {
            position: absolute;
            cursor: move;
            transition: box-shadow .2s
        }

        .design-el.selected {
            box-shadow: 0 0 0 2px var(--accent)
        }

        .design-el .resize {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border: 1px solid #fff;
            cursor: se-resize;
            opacity: 0;
            transition: opacity .1s
        }

        .design-el.selected .resize {
            opacity: 1
        }

        .props {
            width: 260px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0
        }

        .props::-webkit-scrollbar {
            width: 4px
        }

        .props::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px
        }

        .prop-section {
            margin-bottom: 16px
        }

        .prop-title {
            font-size: .72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px
        }

        .prop-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center
        }

        .prop-label {
            font-size: .72rem;
            color: var(--muted);
            min-width: 24px
        }

        .prop-input {
            flex: 1;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: .78rem;
            outline: none;
            font-family: 'Inter';
            text-align: center
        }

        .prop-input:focus {
            border-color: var(--accent)
        }

        .color-row {
            display: flex;
            gap: 4px
        }

        .color-swatch {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform .1s;
            border: 1px solid var(--border)
        }

        .color-swatch:hover {
            transform: scale(1.15)
        }

        .prop-slider {
            width: 100%;
            height: 4px;
            border-radius: 100px;
            background: #444;
            appearance: none;
            outline: none;
            cursor: pointer
        }

        .prop-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <span class="tb-logo">🎨 DesignTool</span>
        <div class="tb-sep"></div>
        <div class="tb-tools">
            <button class="tb-tool" onclick="setTool(this)" title="Move">↕</button>
            <button class="tb-tool active" onclick="setTool(this)" title="Frame">⬜</button>
            <button class="tb-tool" onclick="setTool(this)" title="Rectangle">▬</button>
            <button class="tb-tool" onclick="setTool(this)" title="Ellipse">◯</button>
            <button class="tb-tool" onclick="setTool(this)" title="Text">T</button>
            <button class="tb-tool" onclick="setTool(this)" title="Pen">✏️</button>
            <button class="tb-tool" onclick="setTool(this)" title="Hand">✋</button>
        </div>
        <div class="tb-right">
            <span style="cursor:pointer">100%</span>
            <div class="tb-avatars">
                <div class="tb-av"><img src="https://i.pravatar.cc/48?img=11"></div>
                <div class="tb-av"><img src="https://i.pravatar.cc/48?img=1"></div>
                <div class="tb-av"><img src="https://i.pravatar.cc/48?img=5"></div>
            </div>
            <button class="tb-share">Share</button>
        </div>
    </div>
    <div class="workspace">
        <div class="layers">
            <div class="layers-header"><span class="layers-title">Layers</span></div>
            <div class="layers-tabs">
                <div class="layers-tab active" onclick="setLayerTab(this)">Layers</div>
                <div class="layers-tab" onclick="setLayerTab(this)">Assets</div>
            </div>
            <div id="layersList"></div>
        </div>
        <div class="canvas" id="canvas" onclick="deselectAll(event)">
            <div class="canvas-grid"></div>
        </div>
        <div class="props">
            <div class="prop-section">
                <div class="prop-title">Position</div>
                <div class="prop-row"><span class="prop-label">X</span><input class="prop-input" value="120" id="propX"
                        onchange="updateProp()"><span class="prop-label">Y</span><input class="prop-input" value="80"
                        id="propY" onchange="updateProp()"></div>
                <div class="prop-row"><span class="prop-label">W</span><input class="prop-input" value="360" id="propW"
                        onchange="updateProp()"><span class="prop-label">H</span><input class="prop-input" value="240"
                        id="propH" onchange="updateProp()"></div>
            </div>
            <div class="prop-section">
                <div class="prop-title">Fill</div>
                <div class="color-row">
                    <div class="color-swatch" style="background:var(--accent)" onclick="setColor(this)"></div>
                    <div class="color-swatch" style="background:var(--green)" onclick="setColor(this)"></div>
                    <div class="color-swatch" style="background:var(--red)" onclick="setColor(this)"></div>
                    <div class="color-swatch" style="background:var(--yellow)" onclick="setColor(this)"></div>
                    <div class="color-swatch" style="background:var(--purple)" onclick="setColor(this)"></div>
                    <div class="color-swatch" style="background:#fff" onclick="setColor(this)"></div>
                </div>
            </div>
            <div class="prop-section">
                <div class="prop-title">Opacity</div><input type="range" class="prop-slider" min="0" max="100"
                    value="100" oninput="setOpacity(this.value)">
            </div>
            <div class="prop-section">
                <div class="prop-title">Corner Radius</div>
                <div class="prop-row"><input class="prop-input" value="8" id="propR" onchange="updateRadius()"></div>
            </div>
        </div>
    </div>

    <script>
        const elements = [
            { id: 'frame1', type: 'frame', x: 100, y: 60, w: 360, h: 640, color: '#1e1e1e', radius: 8, label: '📱 Mobile Frame', children: [] },
            { id: 'header', type: 'rect', x: 100, y: 60, w: 360, h: 60, color: '#0d99ff', radius: 0, label: '▬ Header' },
            { id: 'card1', type: 'rect', x: 120, y: 140, w: 320, h: 120, color: '#2c2c2c', radius: 12, label: '▬ Card 1' },
            { id: 'card2', type: 'rect', x: 120, y: 280, w: 320, h: 120, color: '#2c2c2c', radius: 12, label: '▬ Card 2' },
            { id: 'btn', type: 'rect', x: 120, y: 420, w: 320, h: 48, color: '#14ae5c', radius: 24, label: '▬ Button' },
            { id: 'circle1', type: 'ellipse', x: 260, y: 500, w: 80, h: 80, color: '#a259ff', radius: 50, label: '◯ Avatar' },
            { id: 'text1', type: 'text', x: 140, y: 160, w: 200, h: 30, color: 'transparent', radius: 0, label: 'T "Welcome"', text: 'Welcome Back!' },
        ];

        let selectedId = 'frame1';

        function renderCanvas() {
            const canvas = document.getElementById('canvas');
            canvas.querySelectorAll('.design-el').forEach(e => e.remove());
            elements.forEach(el => {
                const div = document.createElement('div');
                div.className = 'design-el' + (el.id === selectedId ? ' selected' : '');
                div.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;background:${el.color};border-radius:${el.radius}px;`;
                if (el.type === 'ellipse') div.style.borderRadius = '50%';
                if (el.text) div.innerHTML = `<span style="color:#fff;font-size:1.1rem;font-weight:700;padding:4px 8px;display:block">${el.text}</span>`;
                div.innerHTML += `<div class="resize"></div>`;
                div.onclick = (e) => { e.stopPropagation(); selectEl(el.id) };

                // Drag
                let startX, startY, origX, origY;
                div.onmousedown = (e) => {
                    if (e.target.classList.contains('resize')) return; startX = e.clientX; startY = e.clientY; origX = el.x; origY = el.y;
                    const move = (ev) => { el.x = origX + (ev.clientX - startX); el.y = origY + (ev.clientY - startY); div.style.left = el.x + 'px'; div.style.top = el.y + 'px'; document.getElementById('propX').value = el.x; document.getElementById('propY').value = el.y };
                    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up) };
                    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
                };
                canvas.appendChild(div);
            });
        }

        function renderLayers() {
            document.getElementById('layersList').innerHTML = elements.slice().reverse().map(el => `<div class="layer${el.id === selectedId ? ' selected' : ''}" onclick="selectEl('${el.id}')"><span class="layer-icon">${el.label.split(' ')[0]}</span>${el.label.split(' ').slice(1).join(' ')}<span class="layer-vis">👁️</span></div>`).join('');
        }

        function selectEl(id) { selectedId = id; const el = elements.find(e => e.id === id); if (el) { document.getElementById('propX').value = el.x; document.getElementById('propY').value = el.y; document.getElementById('propW').value = el.w; document.getElementById('propH').value = el.h; document.getElementById('propR').value = el.radius } renderCanvas(); renderLayers() }
        function deselectAll(e) { if (e.target.classList.contains('canvas-grid')) { selectedId = null; renderCanvas(); renderLayers() } }
        function updateProp() { const el = elements.find(e => e.id === selectedId); if (!el) return; el.x = +document.getElementById('propX').value; el.y = +document.getElementById('propY').value; el.w = +document.getElementById('propW').value; el.h = +document.getElementById('propH').value; renderCanvas() }
        function updateRadius() { const el = elements.find(e => e.id === selectedId); if (!el) return; el.radius = +document.getElementById('propR').value; renderCanvas() }
        function setColor(swatch) { const el = elements.find(e => e.id === selectedId); if (!el) return; el.color = swatch.style.background; renderCanvas() }
        function setOpacity(v) { const els = document.querySelectorAll('.design-el'); els.forEach(e => e.style.opacity = v / 100) }
        function setTool(el) { document.querySelectorAll('.tb-tool').forEach(t => t.classList.remove('active')); el.classList.add('active') }
        function setLayerTab(el) { document.querySelectorAll('.layers-tab').forEach(t => t.classList.remove('active')); el.classList.add('active') }

        renderCanvas(); renderLayers(); selectEl('frame1');
    </script>
</body>

</html>
