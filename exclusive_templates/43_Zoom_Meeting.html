<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetNow — Video Conferencing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #1a1a2e;
            --card: rgba(255, 255, 255, .05);
            --text: #fff;
            --muted: #8b8fa3;
            --accent: #2d8cf0;
            --green: #28a745;
            --red: #dc3545;
            --border: rgba(255, 255, 255, .08)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column
        }

        .meeting {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px;
            background: #111;
            position: relative
        }

        .meeting.gallery-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr
        }

        .meeting.speaker {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr auto
        }

        .participant {
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px
        }

        .participant img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0
        }

        .p-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 60%, rgba(0, 0, 0, .7))
        }

        .p-name {
            position: absolute;
            bottom: 12px;
            left: 12px;
            font-size: .82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 2
        }

        .p-mic {
            font-size: .65rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .p-mic.muted {
            background: var(--red)
        }

        .p-speaking {
            border: 2px solid var(--green);
            box-shadow: 0 0 12px rgba(40, 167, 69, .3)
        }

        .p-pin {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: .75rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s;
            z-index: 2
        }

        .participant:hover .p-pin {
            opacity: 1
        }

        .p-avatar {
            font-size: 3rem;
            z-index: 1
        }

        .p-reactions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            animation: reactionPop 2s ease forwards;
            pointer-events: none;
            z-index: 5
        }

        @keyframes reactionPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.3)
            }

            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2)
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -70%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -100%) scale(.8)
            }
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg);
            flex-shrink: 0
        }

        .ctrl {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all .15s;
            border: none;
            color: var(--text);
            background: rgba(255, 255, 255, .1)
        }

        .ctrl:hover {
            background: rgba(255, 255, 255, .2)
        }

        .ctrl.active {
            background: var(--green)
        }

        .ctrl.muted-ctrl {
            background: var(--red)
        }

        .ctrl.end {
            background: var(--red);
            width: 64px;
            border-radius: 24px;
            font-size: .85rem;
            font-weight: 600
        }

        .ctrl.end:hover {
            background: #c0392b
        }

        .ctrl-label {
            font-size: .6rem;
            color: var(--muted);
            text-align: center;
            margin-top: 2px
        }

        .ctrl-group {
            display: flex;
            flex-direction: column;
            align-items: center
        }

        .meeting-info {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 5;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .mi-badge {
            padding: 4px 12px;
            border-radius: 6px;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(8px);
            font-size: .78rem;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .mi-recording {
            color: var(--red);
            animation: blink 1s infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .chat-panel {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 320px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            display: none;
            flex-direction: column;
            z-index: 10
        }

        .chat-panel.open {
            display: flex
        }

        .cp-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600
        }

        .cp-close {
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background .1s
        }

        .cp-close:hover {
            background: rgba(255, 255, 255, .1)
        }

        .cp-msgs {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .cp-msg {
            font-size: .82rem
        }

        .cp-msg-name {
            font-weight: 600;
            color: var(--accent);
            font-size: .75rem
        }

        .cp-msg-text {
            margin-top: 2px
        }

        .cp-input {
            display: flex;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            gap: 8px
        }

        .cp-input input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .06);
            border: none;
            color: var(--text);
            font-size: .82rem;
            outline: none;
            font-family: 'Inter'
        }

        .cp-input button {
            padding: 8px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: .8rem
        }

        .reactions-bar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(8px);
            padding: 4px;
            border-radius: 100px;
            z-index: 5
        }

        .react-btn {
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all .12s;
            border: none;
            background: none
        }

        .react-btn:hover {
            background: rgba(255, 255, 255, .15);
            transform: scale(1.2)
        }
    </style>
</head>

<body>
    <div class="meeting gallery-4" id="meeting">
        <div class="meeting-info">
            <div class="mi-badge">🔒 DevVault Team Standup</div>
            <div class="mi-badge" id="timer">00:15:32</div>
            <div class="mi-badge mi-recording">● REC</div>
        </div>
    </div>
    <div class="reactions-bar"><button class="react-btn" onclick="sendReaction('👍')">👍</button><button
            class="react-btn" onclick="sendReaction('👏')">👏</button><button class="react-btn"
            onclick="sendReaction('😂')">😂</button><button class="react-btn"
            onclick="sendReaction('❤️')">❤️</button><button class="react-btn"
            onclick="sendReaction('🎉')">🎉</button><button class="react-btn" onclick="sendReaction('🤔')">🤔</button>
    </div>
    <div class="controls">
        <div class="ctrl-group"><button class="ctrl" id="micBtn" onclick="toggleMic()">🎤</button><span
                class="ctrl-label">Mic</span></div>
        <div class="ctrl-group"><button class="ctrl" id="camBtn" onclick="toggleCam()">📹</button><span
                class="ctrl-label">Camera</span></div>
        <div class="ctrl-group"><button class="ctrl" onclick="toggleScreen()">🖥️</button><span
                class="ctrl-label">Share</span></div>
        <div class="ctrl-group"><button class="ctrl" onclick="toggleChat()">💬</button><span
                class="ctrl-label">Chat</span></div>
        <div class="ctrl-group"><button class="ctrl" onclick="sendReaction('👍')">😊</button><span
                class="ctrl-label">React</span></div>
        <div class="ctrl-group"><button class="ctrl" onclick="toggleView()">⊞</button><span
                class="ctrl-label">View</span></div>
        <div class="ctrl-group"><button class="ctrl end" onclick="endCall()">End</button></div>
    </div>
    <div class="chat-panel" id="chatPanel">
        <div class="cp-header">Meeting Chat<span class="cp-close" onclick="toggleChat()">✕</span></div>
        <div class="cp-msgs" id="chatMsgs">
            <div class="cp-msg">
                <div class="cp-msg-name">Sarah Chen</div>
                <div class="cp-msg-text">Hey everyone! Ready for standup? 👋</div>
            </div>
            <div class="cp-msg">
                <div class="cp-msg-name">Alex Rivera</div>
                <div class="cp-msg-text">Yes! Got some exciting updates today</div>
            </div>
        </div>
        <div class="cp-input"><input placeholder="Type a message..." id="chatInput"
                onkeydown="if(event.key==='Enter')sendChatMsg()"><button onclick="sendChatMsg()">Send</button></div>
    </div>

    <script>
        const participants = [
            { name: 'You', avatar: 'https://i.pravatar.cc/800?img=11', speaking: true, muted: false, hasVideo: true },
            { name: 'Sarah Chen', avatar: 'https://i.pravatar.cc/800?img=1', speaking: false, muted: false, hasVideo: true },
            { name: 'Alex Rivera', avatar: 'https://i.pravatar.cc/800?img=5', speaking: false, muted: true, hasVideo: true },
            { name: 'Emma Wilson', avatar: 'https://i.pravatar.cc/800?img=9', speaking: false, muted: false, hasVideo: false },
        ];

        function renderParticipants() {
            const meeting = document.getElementById('meeting');
            const info = meeting.querySelector('.meeting-info');
            meeting.innerHTML = '';
            meeting.appendChild(info);
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant' + (p.speaking ? ' p-speaking' : '');
                div.innerHTML = `${p.hasVideo ? `<img src="${p.avatar}" alt="${p.name}">` : `<span class="p-avatar">${p.name[0]}</span>`}<div class="p-overlay"></div><div class="p-name"><span class="p-mic${p.muted ? ' muted' : ''}">${p.muted ? '🔇' : '🎤'}</span>${p.name}</div><div class="p-pin">📌</div>`;
                meeting.appendChild(div);
            });
        }

        let micOn = true, camOn = true;
        function toggleMic() {
            micOn = !micOn;
            const btn = document.getElementById('micBtn');
            btn.textContent = micOn ? '🎤' : '🔇';
            btn.classList.toggle('muted-ctrl', !micOn);
            participants[0].muted = !micOn;
            renderParticipants();
        }
        function toggleCam() {
            camOn = !camOn;
            const btn = document.getElementById('camBtn');
            btn.textContent = camOn ? '📹' : '📷';
            btn.classList.toggle('muted-ctrl', !camOn);
            participants[0].hasVideo = camOn;
            renderParticipants();
        }
        function toggleScreen() { alert('🖥️ Screen sharing started') }
        function toggleChat() { document.getElementById('chatPanel').classList.toggle('open') }
        function endCall() { if (confirm('Leave meeting?')) alert('👋 You left the meeting') }

        function sendReaction(emoji) {
            const p = document.querySelectorAll('.participant')[0];
            const r = document.createElement('div');
            r.className = 'p-reactions'; r.textContent = emoji;
            p.appendChild(r); setTimeout(() => r.remove(), 2000);
        }

        function sendChatMsg() {
            const input = document.getElementById('chatInput'); if (!input.value.trim()) return;
            const msgs = document.getElementById('chatMsgs');
            msgs.innerHTML += `<div class="cp-msg"><div class="cp-msg-name">You</div><div class="cp-msg-text">${input.value}</div></div>`;
            input.value = ''; msgs.scrollTop = msgs.scrollHeight;
        }

        function toggleView() {
            const m = document.getElementById('meeting');
            m.classList.toggle('speaker'); m.classList.toggle('gallery-4');
        }

        // Timer
        let sec = 932;
        setInterval(() => { sec++; const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60; document.getElementById('timer').textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` }, 1000);

        // Random speaking
        setInterval(() => { participants.forEach(p => p.speaking = false); participants[Math.floor(Math.random() * participants.length)].speaking = true; renderParticipants() }, 3000);

        renderParticipants();
    </script>
</body>

</html>
