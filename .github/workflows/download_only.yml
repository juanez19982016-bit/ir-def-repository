name: "Download Only (ADD files, no rename)"

on:
  workflow_dispatch:
    inputs:
      fresh:
        description: "Reset URL cache to re-download everything"
        required: false
        type: boolean
        default: true

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests tqdm

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
          rclone listremotes

      - name: "ESTADO ANTES"
        run: |
          echo "============================================"
          echo "  ESTADO ACTUAL DEL DRIVE"
          echo "============================================"
          rclone size gdrive2:IR_DEF_REPOSITORY || true
          echo "--------------------------------------------"
          for d in $(rclone lsd gdrive2:IR_DEF_REPOSITORY 2>/dev/null | awk '{print $NF}'); do
            count=$(rclone ls "gdrive2:IR_DEF_REPOSITORY/$d" 2>/dev/null | wc -l)
            echo "  $d: $count archivos"
          done
          echo "============================================"

      - name: "Recuperar cache"
        run: |
          mkdir -p /tmp/ir_repository
          rclone copy gdrive2:IR_DEF_REPOSITORY/.download_cache.json /tmp/ir_repository/ 2>/dev/null || true
          if [ "${{ inputs.fresh }}" = "true" ]; then
            echo "FRESH MODE: eliminando cache para re-descargar TODO"
            rm -f /tmp/ir_repository/.download_cache.json
          fi

      - name: "Cleanup basura del Drive"
        run: |
          python scripts/mega_download.py --tier cleanup --output-dir /tmp/ir_repository || true

      - name: "[1/4] GitHub repos (100+)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== DESCARGANDO 100+ REPOS ==="
          python scripts/mega_download.py --tier github --output-dir /tmp/ir_repository || true
          TOTAL=$(find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)
          echo ">>> Archivos hasta ahora: $TOTAL"

      - name: "[2/4] GitHub releases"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/mega_download.py --tier releases --output-dir /tmp/ir_repository || true
          TOTAL=$(find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)
          echo ">>> Archivos hasta ahora: $TOTAL"

      - name: "[3/4] Direct ZIPs (70+)"
        run: |
          echo "=== DESCARGANDO 70+ ZIPS DIRECTOS ==="
          python scripts/mega_download.py --tier direct --output-dir /tmp/ir_repository || true
          TOTAL=$(find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)
          echo ">>> Archivos hasta ahora: $TOTAL"

      - name: "[4/4] Search + ToneHunt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/mega_download.py --tier search --output-dir /tmp/ir_repository || true
          python scripts/mega_download.py --tier tier3 --output-dir /tmp/ir_repository || true
          TOTAL=$(find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)
          echo ">>> Archivos hasta ahora: $TOTAL"

      - name: "RESUMEN DE DESCARGA"
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  ARCHIVOS DESCARGADOS"
          echo "============================================"
          for d in /tmp/ir_repository/*/; do
            [ -d "$d" ] && echo "  $(basename $d): $(find $d -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l) archivos"
          done
          TOTAL=$(find /tmp/ir_repository -type f \( -name '*.wav' -o -name '*.nam' \) 2>/dev/null | wc -l)
          echo "--------------------------------------------"
          echo "  TOTAL DESCARGADOS: $TOTAL"
          echo "============================================"

      - name: "SUBIR AL DRIVE (sin borrar nada existente)"
        if: always()
        run: |
          echo "Subiendo archivos al Drive (SUMANDO a lo existente)..."
          rclone copy /tmp/ir_repository gdrive2:IR_DEF_REPOSITORY \
            --transfers 8 --checkers 16 --drive-chunk-size 64M \
            --fast-list --stats 15s --log-level INFO --stats-one-line \
            --exclude ".*" --exclude "*.log" --exclude "*.json" --exclude "*.md" --exclude "*.txt" --exclude "*.py"
          echo "Upload completado."

      - name: "Limpiar basura del Drive"
        if: always()
        run: |
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.json" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.log" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.txt" || true
          rclone delete gdrive2:IR_DEF_REPOSITORY --include "*.py" || true
          rclone rmdirs gdrive2:IR_DEF_REPOSITORY || true

      - name: "REPORTE FINAL"
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  REPORTE FINAL — DRIVE"
          echo "============================================"
          rclone size gdrive2:IR_DEF_REPOSITORY || true
          echo "--------------------------------------------"
          GRAND_TOTAL=0
          for d in $(rclone lsd gdrive2:IR_DEF_REPOSITORY 2>/dev/null | awk '{print $NF}'); do
            count=$(rclone ls "gdrive2:IR_DEF_REPOSITORY/$d" 2>/dev/null | wc -l)
            size=$(rclone size "gdrive2:IR_DEF_REPOSITORY/$d" 2>/dev/null | grep "Total size" | awk '{print $3, $4}')
            echo "  $d: $count archivos ($size)"
            GRAND_TOTAL=$((GRAND_TOTAL + count))
          done
          echo "--------------------------------------------"
          echo "  TOTAL ARCHIVOS EN DRIVE: $GRAND_TOTAL"
          echo "============================================"
