name: "Tier 4: Mega Preset Vault 2026"

on:
  workflow_dispatch:
    inputs:
      fresh:
        description: "Reset cache (re-download everything)"
        required: false
        type: boolean
        default: false
  workflow_call:

jobs:
  # ═══════════════════════════════════════════════════════
  # Job 1: Cleanup + Seed Repos + Direct ZIPs
  # ═══════════════════════════════════════════════════════
  job1-cleanup-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: rclone
        env: { RCLONE_CONFIG_B64: "${{ secrets.RCLONE_CONFIG_B64 }}" }
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
      - name: "🧹 Cleanup NAM/WAV/JSON"
        run: python scripts/mega_preset_vault.py --tier cleanup --output-dir /tmp/vault
      - name: Cache
        run: |
          mkdir -p /tmp/vault/03_PRESETS_AND_MODELERS
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/.mega_presets_cache.json /tmp/vault/03_PRESETS_AND_MODELERS/ 2>/dev/null || true
      - name: "🌱 Seed Repos + ZIPs"
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: |
          F=""; [ "${{ inputs.fresh }}" = "true" ] && F="--fresh"
          python scripts/mega_preset_vault.py --tier seed --output-dir /tmp/vault $F
      - name: Stats
        if: always()
        run: |
          for d in /tmp/vault/03_PRESETS_AND_MODELERS/*/; do
            [ -d "$d" ] && echo "$(basename "$d"): $(find "$d" -type f -not -name ".*" | wc -l)"
          done
          echo "TOTAL: $(find /tmp/vault/03_PRESETS_AND_MODELERS -type f -not -name ".*" | wc -l)"
      - name: "☁️ Upload"
        if: always()
        run: rclone copy /tmp/vault/03_PRESETS_AND_MODELERS gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS --transfers 12 --checkers 24 --fast-list --stats 30s --stats-one-line

  # ═══════════════════════════════════════════════════════
  # Job 2: GitHub Search (200+ queries)
  # ═══════════════════════════════════════════════════════
  job2-search:
    needs: [job1-cleanup-seed]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: rclone
        env: { RCLONE_CONFIG_B64: "${{ secrets.RCLONE_CONFIG_B64 }}" }
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
      - name: Cache
        run: |
          mkdir -p /tmp/vault/03_PRESETS_AND_MODELERS
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/.mega_presets_cache.json /tmp/vault/03_PRESETS_AND_MODELERS/ 2>/dev/null || true
      - name: "🔍 GitHub Search"
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: python scripts/mega_preset_vault.py --tier search --output-dir /tmp/vault
      - name: "☁️ Upload"
        if: always()
        run: rclone copy /tmp/vault/03_PRESETS_AND_MODELERS gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS --transfers 12 --checkers 24 --fast-list --stats 30s --stats-one-line

  # ═══════════════════════════════════════════════════════
  # Job 3: GitHub Releases
  # ═══════════════════════════════════════════════════════
  job3-releases:
    needs: [job2-search]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: rclone
        env: { RCLONE_CONFIG_B64: "${{ secrets.RCLONE_CONFIG_B64 }}" }
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
      - name: Cache
        run: |
          mkdir -p /tmp/vault/03_PRESETS_AND_MODELERS
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/.mega_presets_cache.json /tmp/vault/03_PRESETS_AND_MODELERS/ 2>/dev/null || true
      - name: "📦 Releases"
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: python scripts/mega_preset_vault.py --tier releases --output-dir /tmp/vault
      - name: "☁️ Upload"
        if: always()
        run: rclone copy /tmp/vault/03_PRESETS_AND_MODELERS gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS --transfers 12 --checkers 24 --fast-list --stats 30s --stats-one-line

  # ═══════════════════════════════════════════════════════
  # Job 4: GuitarPatches.com (80+ devices)
  # ═══════════════════════════════════════════════════════
  job4-guitarpatches:
    needs: [job3-releases]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: rclone
        env: { RCLONE_CONFIG_B64: "${{ secrets.RCLONE_CONFIG_B64 }}" }
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
      - name: Cache
        run: |
          mkdir -p /tmp/vault/03_PRESETS_AND_MODELERS
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/.mega_presets_cache.json /tmp/vault/03_PRESETS_AND_MODELERS/ 2>/dev/null || true
      - name: "🌐 GuitarPatches.com (80+ devices)"
        run: python scripts/mega_preset_vault.py --tier guitarpatches --output-dir /tmp/vault
      - name: Stats
        if: always()
        run: |
          for d in /tmp/vault/03_PRESETS_AND_MODELERS/*/; do
            [ -d "$d" ] && echo "$(basename "$d"): $(find "$d" -type f -not -name ".*" | wc -l)"
          done
          echo "TOTAL: $(find /tmp/vault/03_PRESETS_AND_MODELERS -type f -not -name ".*" | wc -l)"
      - name: "☁️ Upload"
        if: always()
        run: rclone copy /tmp/vault/03_PRESETS_AND_MODELERS gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS --transfers 12 --checkers 24 --fast-list --stats 30s --stats-one-line

  # ═══════════════════════════════════════════════════════
  # Job 5: PatchStorage.com API (16 platforms)
  # ═══════════════════════════════════════════════════════
  job5-patchstorage:
    needs: [job4-guitarpatches]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: rclone
        env: { RCLONE_CONFIG_B64: "${{ secrets.RCLONE_CONFIG_B64 }}" }
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
      - name: Cache
        run: |
          mkdir -p /tmp/vault/03_PRESETS_AND_MODELERS
          rclone copy gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/.mega_presets_cache.json /tmp/vault/03_PRESETS_AND_MODELERS/ 2>/dev/null || true
      - name: "📦 PatchStorage.com API"
        run: python scripts/mega_preset_vault.py --tier patchstorage --output-dir /tmp/vault
      - name: Stats
        if: always()
        run: |
          for d in /tmp/vault/03_PRESETS_AND_MODELERS/*/; do
            [ -d "$d" ] && echo "$(basename "$d"): $(find "$d" -type f -not -name ".*" | wc -l)"
          done
          echo "TOTAL: $(find /tmp/vault/03_PRESETS_AND_MODELERS -type f -not -name ".*" | wc -l)"
      - name: "☁️ Upload"
        if: always()
        run: rclone copy /tmp/vault/03_PRESETS_AND_MODELERS gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS --transfers 12 --checkers 24 --fast-list --stats 30s --stats-one-line
      - name: "🔥 FINAL"
        if: always()
        run: |
          echo "╔═══════════════════════════════════════════╗"
          echo "║  MEGA PRESET VAULT v3 — FINAL REPORT      ║"
          echo "╚═══════════════════════════════════════════╝"
          rclone size gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS || true
          for d in $(rclone lsd gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS 2>/dev/null | awk '{print $NF}'); do
            c=$(rclone ls "gdrive2:IR_DEF_REPOSITORY/03_PRESETS_AND_MODELERS/$d" 2>/dev/null | wc -l)
            echo "  $d: $c"
          done
