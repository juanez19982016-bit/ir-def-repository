name: Build God-Tier Developer Vault 2026

on:
  workflow_dispatch:

jobs:
  build_vault:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Need to explicitly provide token access

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Search and Scrape Elite Repos
      env:
        # Utilize internal token for code search
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Running God-Tier Dev Scraper..."
        python scripts/github_code_scraper.py
        
    - name: Download & Extract Boilerplates
      run: |
        echo "Processor Running..."
        python scripts/mega_processor_dev.py \
          --json github_dev_assets.json \
          --output God_Tier_Dev_Vault

    - name: Install rclone
      run: curl -fsSL https://rclone.org/install.sh | sudo bash

    - name: Configure rclone
      env:
        RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONF }}
      run: |
        mkdir -p ~/.config/rclone
        echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
        rclone listremotes

    - name: Upload Massive Vault to Google Drive (via Rclone)
      run: |
        echo "Uploading 15GB payload to Drive..."
        # Using the same remote named 'gdrive2' that we used for IRs
        # Adjust flags for a massive upload
        rclone copy God_Tier_Dev_Vault gdrive2:God_Tier_Dev_Vault -v --stats 1m --drive-chunk-size 128M --transfers 8 --checkers 8
