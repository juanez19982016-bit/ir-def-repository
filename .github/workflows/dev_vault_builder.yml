name: Build God-Tier Developer Vault 2026

on:
  workflow_dispatch:

jobs:
  build_vault:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Search and Scrape Elite Repos
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Running V2 Ultra-Premium Scraper..."
        python scripts/github_code_scraper.py

    - name: Download & Extract Boilerplates
      run: |
        echo "Downloading all repos..."
        python scripts/mega_processor_dev.py \
          --json github_dev_assets.json \
          --output God_Tier_Dev_Vault

    - name: Report Vault Size
      run: |
        echo "=== VAULT SIZE REPORT ==="
        du -sh God_Tier_Dev_Vault/ || true
        echo "Total folders:"
        ls God_Tier_Dev_Vault/ | wc -l || true
        echo "Total files:"
        find God_Tier_Dev_Vault/ -type f | wc -l || true
        echo "=== BY CATEGORY ==="
        du -sh God_Tier_Dev_Vault/*/ || true

    - name: Compress Vault into Single Archive
      run: |
        echo "Compressing entire vault into single .tar.gz..."
        tar -czf DevVault_Pro_2026.tar.gz God_Tier_Dev_Vault/
        ls -lh DevVault_Pro_2026.tar.gz
        echo "Compression complete!"

    - name: Install rclone
      run: curl -fsSL https://rclone.org/install.sh | sudo bash

    - name: Configure rclone
      env:
        RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
      run: |
        mkdir -p ~/.config/rclone
        echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf
        rclone listremotes

    - name: Upload Single Archive to Google Drive (FAST)
      run: |
        echo "Uploading compressed archive (should take ~2 min)..."
        rclone copy DevVault_Pro_2026.tar.gz gdrive2:DevVault_Pro/ -v --stats 10s
        echo "Upload complete!"
        rclone size gdrive2:DevVault_Pro/ || true
